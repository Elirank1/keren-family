<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a0a3e">
<title>חתחתול 🐱 Chatchtul</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;user-select:none;-webkit-user-select:none;background:#110826;color:#f0e6ff}
h1,h2,h3,.font-display{font-family:'Fredoka One',cursive}

/* ===== BACKGROUND — Warm cozy purple/midnight ===== */
.bg-main{
  background:linear-gradient(155deg,#1a0a3e 0%,#2d1266 30%,#1a0a3e 50%,#120835 75%,#0d0620 100%);
  position:relative;overflow:hidden;min-height:100vh;min-height:100dvh;
}
.bg-main::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:
    radial-gradient(circle at 20% 30%,rgba(147,88,255,0.10) 0%,transparent 40%),
    radial-gradient(circle at 80% 50%,rgba(255,120,180,0.07) 0%,transparent 40%),
    radial-gradient(circle at 50% 80%,rgba(255,200,80,0.05) 0%,transparent 35%);
  animation:bgRotate 50s linear infinite;pointer-events:none;
}
@keyframes bgRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ===== FLOATING PARTICLES — subtle cat/rat emojis ===== */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;font-size:1.1rem;opacity:0;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0}
  10%{opacity:0.15}
  90%{opacity:0.15}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

/* ===== GLASS MORPHISM ===== */
.glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.07);
}
.glass-strong{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.10);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

/* ===== TOP BAR — glass morphism circles ===== */
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;position:relative;z-index:10;
}
.back-btn{
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.10);
  color:white;cursor:pointer;font-size:1.1rem;
  transition:all 0.3s;text-decoration:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.back-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.12)}
.lang-btn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.10);
  color:white;cursor:pointer;font-weight:900;font-size:0.75rem;
  font-family:'Nunito',sans-serif;transition:all 0.3s;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.lang-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.12)}

/* ===== CONTAINER ===== */
.container{max-width:600px;margin:0 auto;padding:0 12px 24px;position:relative;z-index:1}

/* ===== TITLE ===== */
.title-gradient{
  background:linear-gradient(135deg,#fff 0%,#c9a0ff 25%,#ffadd2 50%,#ffd480 75%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 3px 16px rgba(147,88,255,0.4));
  letter-spacing:-0.02em;
}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;align-items:center;gap:16px}
.screen.active{display:flex}

/* ===========================================================
   CARD SYSTEM — Illustrated Rat-a-Tat Cat style
   =========================================================== */
.card-slot{
  width:80px;height:112px;border-radius:12px;position:relative;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  perspective:800px;flex-shrink:0;
}
.card-slot:hover{transform:translateY(-5px)}
.card-slot:active{transform:scale(0.94)}
.card-slot.selected{
  box-shadow:0 0 0 3px rgba(255,217,61,0.9),0 0 20px rgba(255,217,61,0.35);
}
.card-slot.glow-hint{animation:glowHint 1.5s ease-in-out infinite}
@keyframes glowHint{
  0%,100%{box-shadow:0 0 6px rgba(255,217,61,0.1)}
  50%{box-shadow:0 0 18px rgba(255,217,61,0.45),0 0 30px rgba(255,217,61,0.15)}
}

/* Computer cards — smaller */
.comp-area .card-slot{width:60px;height:85px}
.comp-area .card-back .paw-center{font-size:0.9rem}
.comp-area .card-front .card-corner{font-size:0.65rem}
.comp-area .card-front .card-emoji-main{font-size:1.4rem}
.comp-area .card-front .card-dots{gap:2px}
.comp-area .card-front .card-dots span{width:4px;height:4px}

/* Player cards — larger */
.player-area-cards .card-slot{width:82px;height:114px}

.card-inner{
  width:100%;height:100%;position:relative;
  transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style:preserve-3d;
}
.card-inner.flipped{transform:rotateY(180deg)}

.card-face{
  position:absolute;width:100%;height:100%;border-radius:12px;
  backface-visibility:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
}

/* ===== CARD BACK — Navy/purple with paw print pattern ===== */
.card-back{
  background:linear-gradient(145deg,#3a1a6e,#4b2494,#3a1a6e);
  border:2px solid rgba(255,255,255,0.10);
  box-shadow:inset 0 2px 12px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.25);
  overflow:hidden;
}
/* Repeating paw-dot pattern via radial-gradient */
.card-back::before{
  content:'';position:absolute;inset:6px;border-radius:8px;
  border:1.5px solid rgba(255,255,255,0.06);
  background:
    radial-gradient(circle 3px at 25% 20%, rgba(255,255,255,0.06) 50%, transparent 51%),
    radial-gradient(circle 2px at 35% 15%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 2px at 15% 15%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 3px at 75% 45%, rgba(255,255,255,0.06) 50%, transparent 51%),
    radial-gradient(circle 2px at 85% 40%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 2px at 65% 40%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 3px at 30% 60%, rgba(255,255,255,0.06) 50%, transparent 51%),
    radial-gradient(circle 2px at 40% 55%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 2px at 20% 55%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 3px at 70% 80%, rgba(255,255,255,0.06) 50%, transparent 51%),
    radial-gradient(circle 2px at 80% 75%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 2px at 60% 75%, rgba(255,255,255,0.05) 50%, transparent 51%),
    radial-gradient(circle 3px at 50% 95%, rgba(255,255,255,0.06) 50%, transparent 51%);
  pointer-events:none;
}
.paw-center{
  font-size:1.3rem;opacity:0.12;position:relative;z-index:1;
  text-shadow:0 0 8px rgba(255,255,255,0.08);
}

/* ===== CARD FRONT — White/cream card with colored top strip ===== */
.card-front{
  transform:rotateY(180deg);
  background:#faf5ee;
  border:2px solid rgba(0,0,0,0.08);
  box-shadow:0 4px 18px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.6);
  color:#333;
  position:relative;
}
/* Colored top strip */
.card-top-strip{
  position:absolute;top:0;left:0;right:0;height:22px;
  border-radius:10px 10px 0 0;
}
.comp-area .card-top-strip{height:16px;border-radius:8px 8px 0 0}

/* Corner numbers */
.card-corner{
  position:absolute;font-family:'Fredoka One',cursive;font-size:0.8rem;
  font-weight:900;line-height:1;z-index:2;
}
.card-corner-tl{top:4px;left:6px}
.card-corner-br{bottom:4px;right:6px;transform:rotate(180deg)}
[dir="rtl"] .card-corner-tl{top:4px;right:6px;left:auto}
[dir="rtl"] .card-corner-br{bottom:4px;left:6px;right:auto;transform:rotate(180deg)}

/* Main emoji */
.card-emoji-main{
  font-size:1.9rem;line-height:1;margin-top:6px;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15));
  position:relative;z-index:1;
}

/* Value dots below emoji */
.card-dots{
  display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;justify-content:center;max-width:60px;
}
.card-dots span{
  width:5px;height:5px;border-radius:50%;opacity:0.6;
}

/* Card type label */
.card-type-label{
  font-size:0.5rem;font-weight:900;text-transform:uppercase;
  letter-spacing:0.1em;opacity:0.5;margin-top:2px;
  font-family:'Fredoka One',cursive;
}

/* ===== CARD COLORS BY VALUE ===== */
/* Low cards (0-2): Cats — pastel green/teal strip */
.card-cat .card-top-strip{background:linear-gradient(90deg,#78d7a0,#4ec6a0)}
.card-cat .card-corner{color:#2d8f6f}
.card-cat .card-dots span{background:#4ec6a0}
.card-cat .card-type-label{color:#2d8f6f}

/* Mid cards (3-5): Neutral — amber/yellow strip */
.card-mid .card-top-strip{background:linear-gradient(90deg,#ffc857,#f0a030)}
.card-mid .card-corner{color:#b07818}
.card-mid .card-dots span{background:#f0a030}
.card-mid .card-type-label{color:#b07818}

/* High cards (6-8): Rats — orange/red strip */
.card-rat .card-top-strip{background:linear-gradient(90deg,#ff7b54,#e84040)}
.card-rat .card-corner{color:#c02020}
.card-rat .card-dots span{background:#e84040}
.card-rat .card-type-label{color:#c02020}

/* Card 9: Boss rat — dark red strip */
.card-super-rat .card-top-strip{background:linear-gradient(90deg,#a01030,#6b0020)}
.card-super-rat .card-corner{color:#8b0000}
.card-super-rat .card-dots span{background:#8b0000}
.card-super-rat .card-type-label{color:#8b0000}
.card-super-rat{
  box-shadow:0 4px 18px rgba(139,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.6);
}

/* Special cards: Blue/purple strip + star icon */
.card-special .card-top-strip{background:linear-gradient(90deg,#7c5cf7,#4a6cf7)}
.card-special .card-corner{color:#4a5ce0}
.card-special .card-dots span{background:#7c5cf7}
.card-special .card-type-label{color:#4a5ce0}

/* ===== PILE CARD FRONTS (discard) - colored background style ===== */
.pile-card-face{
  border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:white;
  width:100%;height:100%;position:relative;
}
.pile-cat{background:linear-gradient(145deg,#4ec6a0,#2d9070)}
.pile-mid{background:linear-gradient(145deg,#f0a030,#d08010)}
.pile-rat{background:linear-gradient(145deg,#e84040,#c52020)}
.pile-super-rat{background:linear-gradient(145deg,#8b0000,#5c0000)}
.pile-special{background:linear-gradient(145deg,#6b5cf7,#4a4ce0)}

/* ===== PEEK TIMER RING ===== */
.peek-timer{position:absolute;top:-6px;right:-6px;width:28px;height:28px;z-index:5;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.peek-timer circle{fill:none;stroke-width:3;transform:rotate(-90deg);transform-origin:center}
.peek-timer .bg{stroke:rgba(255,255,255,0.15)}
.peek-timer .progress{stroke:#ffd93d;stroke-dasharray:62.83;stroke-dashoffset:0;transition:stroke-dashoffset 0.1s linear;stroke-linecap:round}
.card-slot.peeking{
  box-shadow:0 0 16px rgba(255,217,61,0.45),0 0 35px rgba(255,217,61,0.15);
  animation:peekGlow 0.8s ease-in-out infinite;
}
@keyframes peekGlow{
  0%,100%{box-shadow:0 0 16px rgba(255,217,61,0.45)}
  50%{box-shadow:0 0 28px rgba(255,217,61,0.65),0 0 50px rgba(255,217,61,0.2)}
}

/* ===== PLAYER AREAS ===== */
.player-area{
  width:100%;padding:12px 10px;border-radius:20px;text-align:center;
  transition:border-color 0.3s;
}
.player-label{
  font-family:'Fredoka One',cursive;font-size:0.9rem;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.cards-row{display:flex;justify-content:center;gap:10px}

.comp-area{border-color:rgba(231,76,60,0.12)!important}
.comp-area .cards-row{gap:7px}
.player-area-cards{border-color:rgba(78,198,160,0.12)!important}
.player-area-cards .cards-row{gap:10px}

/* ===== CENTER AREA — Draw & Discard ===== */
.center-area{
  display:flex;align-items:center;justify-content:center;gap:28px;
  padding:12px 0;width:100%;
}
.pile{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:all 0.25s;
}
.pile:hover{transform:scale(1.07)}
.pile:active{transform:scale(0.95)}
.pile-card{
  width:68px;height:95px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:box-shadow 0.3s;
}
.pile-label{font-size:0.68rem;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:0.03em}
.draw-count{
  position:absolute;top:-6px;right:-6px;
  background:#ffd93d;color:#333;
  font-size:0.55rem;font-weight:900;font-family:'Fredoka One',cursive;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
  border:2px solid #1a0a3e;
}

.pile:hover .pile-card{
  box-shadow:0 0 18px rgba(147,88,255,0.35);
}
#drawPile .pile-card{
  box-shadow:0 3px 16px rgba(75,36,148,0.4);
}
#discardPile .pile-card{
  box-shadow:0 3px 16px rgba(0,0,0,0.25);
}

/* ===== VS DIVIDER ===== */
.vs-divider{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:2px 0;opacity:0.3;
}
.vs-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent)}
.vs-text{font-family:'Fredoka One',cursive;font-size:0.7rem;color:rgba(255,255,255,0.3)}

/* ===== ACTION BUTTONS ===== */
.action-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;width:100%;padding:4px 0}
.action-btn{
  padding:12px 22px;border-radius:16px;border:none;color:white;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;
  cursor:pointer;transition:all 0.25s;min-height:48px;min-width:56px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  position:relative;overflow:hidden;
}
.action-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 50%);
  border-radius:16px;pointer-events:none;
}
.action-btn:hover{transform:translateY(-3px)}
.action-btn:active{transform:scale(0.95)}
.action-btn:disabled{opacity:0.2;cursor:not-allowed;transform:none!important}
.action-btn.primary{background:linear-gradient(145deg,#e74c3c,#c0392b);box-shadow:0 4px 18px rgba(231,76,60,0.3)}
.action-btn.secondary{background:linear-gradient(145deg,#6b3fa0,#8b5fbf);box-shadow:0 4px 18px rgba(107,63,160,0.3)}
.action-btn.gold{background:linear-gradient(145deg,#f39c12,#e67e22);box-shadow:0 4px 18px rgba(243,156,18,0.3)}
.action-btn.green{background:linear-gradient(145deg,#27ae60,#1e8a4e);box-shadow:0 4px 18px rgba(39,174,96,0.3)}

/* ===== CHATCHTUL BUTTON — dramatic pulsing ===== */
.chatchtul-btn{
  background:linear-gradient(145deg,#ff4757,#c0392b,#e74c3c)!important;
  box-shadow:0 6px 25px rgba(231,76,60,0.45)!important;
  font-size:1.05rem!important;padding:14px 28px!important;
  border:2px solid rgba(255,255,255,0.12)!important;
  letter-spacing:0.03em;border-radius:20px!important;
}
.chatchtul-btn.ready{animation:chatchtulPulse 2s ease-in-out infinite}
@keyframes chatchtulPulse{
  0%,100%{
    box-shadow:0 6px 25px rgba(231,76,60,0.45),0 0 0 0 rgba(231,76,60,0.35);
    transform:scale(1);
  }
  50%{
    box-shadow:0 8px 35px rgba(231,76,60,0.6),0 0 0 10px rgba(231,76,60,0);
    transform:scale(1.03);
  }
}

/* Shockwave + screen flash on chatchtul call */
.shockwave{
  position:fixed;top:50%;left:50%;width:10px;height:10px;
  border-radius:50%;border:3px solid rgba(255,71,87,0.8);
  transform:translate(-50%,-50%);z-index:999;pointer-events:none;
  animation:shockwaveExpand 0.8s ease-out forwards;
}
@keyframes shockwaveExpand{
  0%{width:10px;height:10px;opacity:1;border-width:3px}
  100%{width:100vmax;height:100vmax;opacity:0;border-width:1px}
}
.screen-flash{
  position:fixed;inset:0;background:rgba(255,71,87,0.12);z-index:998;
  pointer-events:none;animation:flashFade 0.5s ease-out forwards;
}
@keyframes flashFade{0%{opacity:1}100%{opacity:0}}

/* ===== STATUS MESSAGE ===== */
.status-msg{
  text-align:center;font-weight:700;font-size:0.85rem;
  color:rgba(255,255,255,0.5);min-height:24px;padding:5px 14px;
  line-height:1.3;letter-spacing:0.01em;
}

/* ===== DRAWN CARD DISPLAY ===== */
.drawn-card-display{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:100;transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  pointer-events:none;
}
.drawn-card-display.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.drawn-card-big{
  width:140px;height:195px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#faf5ee;color:#333;position:relative;overflow:hidden;
  border:3px solid rgba(0,0,0,0.08);
  box-shadow:0 25px 80px rgba(0,0,0,0.5),0 0 30px rgba(147,88,255,0.15);
}
.drawn-card-big .drawn-strip{
  position:absolute;top:0;left:0;right:0;height:30px;border-radius:13px 13px 0 0;
}
.drawn-card-big .card-emoji{font-size:3.5rem;margin-top:10px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.15))}
.drawn-card-big .card-value{font-size:2.2rem;font-family:'Fredoka One',cursive;margin-top:2px}
.drawn-card-big .card-name{font-size:0.85rem;font-weight:800;margin-top:2px;opacity:0.7}
.drawn-card-big .card-label{font-size:0.5rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;opacity:0.4;margin-top:2px}
/* Colored big-card variants */
.drawn-big-cat .drawn-strip{background:linear-gradient(90deg,#78d7a0,#4ec6a0)}
.drawn-big-cat .card-value,.drawn-big-cat .card-name{color:#2d8f6f}
.drawn-big-mid .drawn-strip{background:linear-gradient(90deg,#ffc857,#f0a030)}
.drawn-big-mid .card-value,.drawn-big-mid .card-name{color:#b07818}
.drawn-big-rat .drawn-strip{background:linear-gradient(90deg,#ff7b54,#e84040)}
.drawn-big-rat .card-value,.drawn-big-rat .card-name{color:#c02020}
.drawn-big-super-rat .drawn-strip{background:linear-gradient(90deg,#a01030,#6b0020)}
.drawn-big-super-rat .card-value,.drawn-big-super-rat .card-name{color:#8b0000}
.drawn-big-special .drawn-strip{background:linear-gradient(90deg,#7c5cf7,#4a6cf7)}
.drawn-big-special .card-value,.drawn-big-special .card-name{color:#4a5ce0}

.drawn-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
}
.drawn-overlay.show{opacity:1;pointer-events:auto}

/* ===== SWAP ANIMATION ===== */
.card-slot.swapping{animation:swapArc 0.7s cubic-bezier(0.4,0,0.2,1)}
@keyframes swapArc{
  0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}
  25%{transform:translateY(-45px) scale(1.12) rotate(-4deg);opacity:0.85}
  50%{transform:translateY(-25px) translateX(18px) scale(1.08) rotate(3deg);opacity:0.7}
  75%{transform:translateY(15px) scale(0.96) rotate(-2deg);opacity:0.85}
  100%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}

.score-overlay{

}
.score-overlay.show{display:flex}
.score-panel{
  width:92%;max-width:420px;border-radius:24px;padding:24px 20px;

  background:rgba(255,255,255,0.06);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
@keyframes scoreSlideIn{
  0%{transform:translateY(60px) scale(0.8);opacity:0}
  60%{transform:translateY(-10px) scale(1.02)}
  100%{transform:translateY(0) scale(1);opacity:1}
}
.score-title{font-size:2.2rem;font-family:'Fredoka One',cursive;margin-bottom:4px}
.score-subtitle{font-size:0.85rem;color:rgba(255,255,255,0.35);margin-bottom:14px}
.score-cards-reveal{display:flex;justify-content:center;gap:8px;margin:8px 0}
.score-card-mini{
  width:52px;height:72px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#faf5ee;color:#333;position:relative;overflow:hidden;
  border:2px solid rgba(0,0,0,0.06);
  box-shadow:0 3px 12px rgba(0,0,0,0.2);
  animation:cardRevealPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) backwards;
}
.score-card-mini .mini-strip{
  position:absolute;top:0;left:0;right:0;height:12px;border-radius:8px 8px 0 0;
}
.score-card-mini:nth-child(1){animation-delay:0.1s}
.score-card-mini:nth-child(2){animation-delay:0.25s}
.score-card-mini:nth-child(3){animation-delay:0.4s}
.score-card-mini:nth-child(4){animation-delay:0.55s}
@keyframes cardRevealPop{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
.score-card-mini .card-emoji{font-size:1.2rem;margin-top:4px}
.score-card-mini .card-value{font-size:0.9rem;font-family:'Fredoka One',cursive}
.score-total{font-size:1.5rem;font-family:'Fredoka One',cursive;margin:3px 0}
.score-row{margin-bottom:14px}
.score-row-label{font-size:0.75rem;color:rgba(255,255,255,0.35);font-weight:700;letter-spacing:0.03em}
.result-emoji{font-size:4rem;margin:6px 0;animation:resultBounce 0.6s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes resultBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

.stats-card{
  display:flex;justify-content:center;gap:24px;
  padding:8px 18px;border-radius:12px;margin:8px 0 4px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);
}
.stats-card .stat{text-align:center}
.stats-card .stat-num{font-family:'Fredoka One',cursive;font-size:1rem}
.stats-card .stat-label{font-size:0.6rem;color:rgba(255,255,255,0.35);font-weight:700}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;width:8px;height:8px;z-index:999;pointer-events:none;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ===== RECORD BAR ===== */
.record-bar{display:flex;justify-content:center;gap:16px;font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.3)}
.record-bar span{display:flex;align-items:center;gap:4px}

/* ===== MENU SCREEN ===== */
.menu-art{font-size:5rem;margin:10px 0;animation:menuFloat 4s ease-in-out infinite}
@keyframes menuFloat{
  0%,100%{transform:translateY(0) rotate(-2deg)}
  50%{transform:translateY(-12px) rotate(2deg)}
}

/* ===== RULES MODAL ===== */
.rules-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:rulesFadeIn 0.3s ease}
@keyframes rulesFadeIn{0%{opacity:0}100%{opacity:1}}
.rules-card-modal{background:rgba(255,255,255,0.12);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:28px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;color:white;position:relative}
.rules-card-modal h2{font-family:'Fredoka One',cursive;font-size:1.6rem;margin-bottom:16px;text-align:center}
.rules-card-modal ul{list-style:none;padding:0}
.rules-card-modal li{padding:8px 0;font-size:0.95rem;line-height:1.5;border-bottom:1px solid rgba(255,255,255,0.08)}
.rules-card-modal li:last-child{border-bottom:none}
.rules-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
.rules-close:hover{background:rgba(255,255,255,0.25);transform:scale(1.1)}
.rules-got-it{display:block;width:100%;margin-top:20px;padding:14px;border:none;border-radius:16px;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:white;transition:all 0.2s}
.rules-got-it:hover{transform:scale(1.03);box-shadow:0 6px 20px rgba(102,126,234,0.4)}

/* ===== DIFFICULTY ===== */
.diff-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.diff-btn{
  padding:11px 22px;border-radius:14px;
  border:2px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);color:white;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;

}
.diff-btn:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05)}
.diff-btn.selected{border-color:#ffd93d;background:rgba(255,217,61,0.08);color:#ffd93d;box-shadow:0 0 16px rgba(255,217,61,0.08)}

/* ===== TURN INDICATOR ===== */
.turn-indicator{
  font-size:0.72rem;font-weight:800;padding:4px 12px;border-radius:10px;
  display:inline-flex;align-items:center;gap:5px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid transparent;transition:all 0.3s;
}
.turn-player{
  background:rgba(78,198,160,0.15);color:#78d7a0;
  border-color:rgba(78,198,160,0.2);
  box-shadow:0 0 12px rgba(78,198,160,0.08);
  animation:turnGlow 2s ease-in-out infinite;
}
@keyframes turnGlow{
  0%,100%{box-shadow:0 0 12px rgba(78,198,160,0.08)}
  50%{box-shadow:0 0 22px rgba(78,198,160,0.18)}
}
.turn-computer{
  background:rgba(231,76,60,0.12);color:#f87171;
  border-color:rgba(231,76,60,0.15);
  box-shadow:0 0 12px rgba(231,76,60,0.08);
}

/* ===== THINKING DOTS ===== */
.thinking-dots span{display:inline-block;animation:thinkDot 1.4s infinite;opacity:0.3;font-size:1.2em}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes thinkDot{0%,80%,100%{opacity:0.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);
  z-index:500;padding:11px 22px;border-radius:16px;
  font-weight:800;font-size:0.82rem;
  transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 28px rgba(0,0,0,0.35);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== SPECIAL CARD OVERLAY ===== */
.special-overlay{
  position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.special-overlay.show{display:flex}
.special-panel{
  width:85%;max-width:360px;border-radius:22px;padding:22px 18px;
  text-align:center;animation:scoreSlideIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}

/* ===== RESPONSIVE ===== */
@media(max-width:380px){

// --- Card data ---
const CARD_TYPES = {
  PEEK: 'peek',
  SWAP: 'swap',
  DRAW2: 'draw2',
};

function makeCard(value) {
  if (typeof value === 'string') return { value, special: true };
  return { value, special: false };
}

// Emoji arrays for variety
const CAT_EMOJIS = ['😺','😸','😻','😺'];
const MID_EMOJIS = ['🐶','🐰','🐸'];
const RAT_EMOJIS = ['🐀','🐁','🐀'];

function cardEmoji(card) {
  if (card.special) {
    if (card.value === CARD_TYPES.PEEK) return '👁️';
    if (card.value === CARD_TYPES.SWAP) return '🔄';
    if (card.value === CARD_TYPES.DRAW2) return '🃏';
  }
  if (card.value <= 0) return '😻';
  if (card.value <= 2) return CAT_EMOJIS[card.value] || '😺';
  if (card.value <= 5) return MID_EMOJIS[card.value - 3] || '🐾';
  if (card.value <= 8) return RAT_EMOJIS[card.value - 6] || '🐀';
  return '🐀';
}

function cardName(card) {
  if (card.special) {
    if (card.value === CARD_TYPES.PEEK) return lang === 'he' ? 'הצצה' : 'Peek';
    if (card.value === CARD_TYPES.SWAP) return lang === 'he' ? 'החלפה' : 'Swap';
    if (card.value === CARD_TYPES.DRAW2) return lang === 'he' ? 'שלוף 2' : 'Draw 2';
  }
  return card.value.toString();
}

function cardColorClass(card) {
  if (card.special) return 'card-special';
  if (card.value <= 2) return 'card-cat';
  if (card.value <= 5) return 'card-mid';
  if (card.value <= 8) return 'card-rat';
  return 'card-super-rat';
}

function bigCardClass(card) {
  if (card.special) return 'drawn-big-special';
  if (card.value <= 2) return 'drawn-big-cat';
  if (card.value <= 5) return 'drawn-big-mid';
  if (card.value <= 8) return 'drawn-big-rat';
  return 'drawn-big-super-rat';
}

function pileColorClass(card) {
  if (card.special) return 'pile-special';
  if (card.value <= 2) return 'pile-cat';
  if (card.value <= 5) return 'pile-mid';
  if (card.value <= 8) return 'pile-rat';
  return 'pile-super-rat';
}

function miniStripColor(card) {
  if (card.special) return 'linear-gradient(90deg,#7c5cf7,#4a6cf7)';
  if (card.value <= 2) return 'linear-gradient(90deg,#78d7a0,#4ec6a0)';
  if (card.value <= 5) return 'linear-gradient(90deg,#ffc857,#f0a030)';
  if (card.value <= 8) return 'linear-gradient(90deg,#ff7b54,#e84040)';
  return 'linear-gradient(90deg,#a01030,#6b0020)';
}

function dotColor(card) {
  if (card.special) return '#7c5cf7';
  if (card.value <= 2) return '#4ec6a0';
  if (card.value <= 5) return '#f0a030';
  if (card.value <= 8) return '#e84040';
  return '#8b0000';
}

function buildDeck() {
  const deck = [];
  for (let v = 0; v <= 9; v++) {
    for (let i = 0; i < 4; i++) deck.push(makeCard(v));
  }
  for (let i = 0; i < 2; i++) {
    deck.push(makeCard(CARD_TYPES.PEEK));
    deck.push(makeCard(CARD_TYPES.SWAP));
    deck.push(makeCard(CARD_TYPES.DRAW2));
  }
  return deck;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- Render cards (NEW illustrated style) ---
function renderCard(container, card, faceUp, index, owner) {
  const slot = document.createElement('div');
  slot.className = 'card-slot';
  slot.dataset.index = index;
  slot.dataset.owner = owner;

  const inner = document.createElement('div');
  inner.className = 'card-inner' + (faceUp ? ' flipped' : '');

  // BACK face
  const back = document.createElement('div');
  back.className = 'card-face card-back';
  back.innerHTML = '<span class="paw-center">🐾</span>';

  // FRONT face — white card with colored strip, corner numbers, emoji, dots
  const front = document.createElement('div');
  front.className = `card-face card-front ${cardColorClass(card)}`;

  const val = card.special ? '' : card.value;
  const emoji = cardEmoji(card);
  const cornerNum = card.special ? '★' : card.value;

  // Build dots (number of dots = card value, max 9)
  let dotsHTML = '';
  if (!card.special && card.value > 0) {
    const dc = dotColor(card);
    let dots = '';
    const count = Math.min(card.value, 9);
    for (let d = 0; d < count; d++) {
      dots += `<span style="background:${dc}"></span>`;
    }
    dotsHTML = `<div class="card-dots">${dots}</div>`;
  }

  // Special card label
  let specialLabel = '';
  if (card.special) {
    specialLabel = `<span class="card-type-label">${cardName(card)}</span>`;
  }

  // Card 9 skull indicator
  let extraLabel = '';
  if (!card.special && card.value === 9) {
    extraLabel = '<span style="font-size:0.55rem;margin-top:1px;opacity:0.5">💀</span>';
  }

  front.innerHTML = `
    <div class="card-top-strip"></div>
    <span class="card-corner card-corner-tl">${cornerNum}</span>
    <span class="card-corner card-corner-br">${cornerNum}</span>
    <span class="card-emoji-main">${emoji}</span>
    ${!card.special ? `<span style="font-family:'Fredoka One',cursive;font-size:0.95rem;margin-top:1px;line-height:1">${val}</span>` : ''}
    ${specialLabel}
    ${dotsHTML}
    ${extraLabel}
  `;

  inner.appendChild(back);
  inner.appendChild(front);
  slot.appendChild(inner);
  container.appendChild(slot);
  return slot;
}

// --- Flip a card temporarily (peek with glow + timer ring) ---
function peekCard(owner, index, duration = 3000) {
  return new Promise(resolve => {
    const cont = owner === 'player' ? document.getElementById('playerCards') : document.getElementById('compCards');
    const slot = cont.children[index];
    if (!slot) { resolve(); return; }
    const inner = slot.querySelector('.card-inner');
    inner.classList.add('flipped');
    slot.classList.add('peeking');

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('peek-timer');
    svg.setAttribute('viewBox', '0 0 24 24');
    const bgC = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    bgC.classList.add('bg'); bgC.setAttribute('cx','12'); bgC.setAttribute('cy','12'); bgC.setAttribute('r','10');
    const prC = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    prC.classList.add('progress'); prC.setAttribute('cx','12'); prC.setAttribute('cy','12'); prC.setAttribute('r','10');
    svg.appendChild(bgC); svg.appendChild(prC);
    slot.appendChild(svg);

    const totalMs = duration;
    const step = 50;
    let elapsed = 0;
    const interval = setInterval(() => {
      elapsed += step;
      const frac = elapsed / totalMs;
      prC.style.strokeDashoffset = (62.83 * frac).toFixed(2);
      if (elapsed >= totalMs) {
        clearInterval(interval);
        inner.classList.remove('flipped');
        slot.classList.remove('peeking');
        svg.remove();
        resolve();
      }
    }, step);
  });
}

function flipCardPermanent(owner, index) {

// --- Start Game ---
function startGame() {
  deck = shuffle(buildDeck());
  discard = [];
  playerHand = []; compHand = [];
  playerKnown = new Set();
  compKnown = new Set();
  compMemory = { player: {}, comp: {} };
  chatchtulCaller = null;
  lastTurnFor = null;
  turnCount = 0;
  phase = 'dealing';

  let dealing = true;
  while (dealing) {
    deck = shuffle(buildDeck());
    playerHand = []; compHand = [];
    let ok = true;
    for (let i = 0; i < 4; i++) {
      const pc = deck.pop();
      if (pc.special) { ok = false; break; }
      playerHand.push(pc);
    }
    if (!ok) continue;
    for (let i = 0; i < 4; i++) {
      const cc = deck.pop();
      if (cc.special) { ok = false; break; }
      compHand.push(cc);
    }
    if (ok) dealing = false;
  }

  let firstDiscard = deck.pop();
  while (firstDiscard.special) {
    deck.unshift(firstDiscard);
    shuffle(deck);
    firstDiscard = deck.pop();
  }
  discard.push(firstDiscard);

  showScreen('gameScreen');
  renderPlayerCards();
  renderCompCards();
  renderDiscardTop();
  updateDeckCount();

  compMemory.comp[0] = compHand[0].value;
  compMemory.comp[3] = compHand[3].value;

  phase = 'memorize';
  enableChatchtul(false);
  document.getElementById('compTurn').style.display = 'none';
  document.getElementById('playerTurn').style.display = 'none';

  const dur = 5000;
  setStatus('memorize', { s: '5' });

  let timeLeft = 5;
  const countdown = setInterval(() => {
    timeLeft--;
    if (timeLeft > 0) setStatus('memorize', { s: String(timeLeft) });
  }, 1000);

  Promise.all([
    peekCard('player', 0, dur),
    peekCard('player', 3, dur)
  ]).then(() => {
    clearInterval(countdown);
    playerKnown.add(0);
    playerKnown.add(3);
    startPlayerTurn();
  });
}

// --- Draw from deck ---
function drawFromDeck() {
  if (phase !== 'playerTurn') return;
  if (deck.length === 0) { reshuffleDeck(); }
  drawnCard = deck.pop();
  updateDeckCount();
  enablePiles(false);

  showDrawnCard(drawnCard);

  if (drawnCard.special) {
    handleSpecialDraw(drawnCard);
  } else {
    handleNumberDraw(drawnCard);
  }
}

function drawFromDiscard() {
  if (phase !== 'playerTurn') return;
  if (discard.length === 0) return;
  drawnCard = discard.pop();
  renderDiscardTop();
  enablePiles(false);

  showDrawnCard(drawnCard);

  if (drawnCard.special) {
    handleSpecialDraw(drawnCard);
  } else {
    handleNumberDrawFromDiscard(drawnCard);
  }
}

function handleNumberDraw(card) {
  phase = 'playerDrew';
  setStatus('drawnNumber', { v: card.value });

  const actions = document.getElementById('drawnActions');
  actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:46px">${t('discardIt')}</button>`;

  highlightPlayerCards('swap');
}

function handleNumberDrawFromDiscard(card) {
  phase = 'playerDrew';
  setStatus('drawnNumber', { v: card.value });

  const actions = document.getElementById('drawnActions');
  actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:46px">${t('discardIt')}</button>`;

  highlightPlayerCards('swap');
}

function handleSpecialDraw(card) {
  phase = 'playerSpecial';
  const type = card.value;

  if (type === CARD_TYPES.PEEK) {
    setStatus('drawnSpecialPeek');
    const actions = document.getElementById('drawnActions');
    actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:46px">${t('discardIt')}</button>`;
    highlightPlayerCards('peek');
  } else if (type === CARD_TYPES.SWAP) {
    setStatus('drawnSpecialSwap');
    const actions = document.getElementById('drawnActions');
    actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:46px">${t('discardIt')}</button>`;
    highlightPlayerCards('swapSpecial');
  } else if (type === CARD_TYPES.DRAW2) {
    setStatus('drawnSpecialDraw2');
    hideDrawnCard();
    handleDraw2();
  }
}

function highlightPlayerCards(mode) {
  const cont = document.getElementById('playerCards');
  Array.from(cont.children).forEach(slot => {
    slot.classList.add('glow-hint');
    slot.dataset.mode = mode;
  });
}

// --- Handle card clicks ---
let swapSpecialStep = null;
let swapSpecialOwnIndex = null;

function handleCardClick(owner, index, slot) {
  if (phase === 'playerDrew' && owner === 'player') {
    const old = playerHand[index];
    playerHand[index] = drawnCard;
    discard.push(old);
    playerKnown.add(index);

    hideDrawnCard();
    renderPlayerCards();
    renderDiscardTop();
    removeCardHighlights();

    peekCard('player', index, 1500).then(() => {
      endPlayerTurn();
    });
    return;
  }

  if (phase === 'playerSpecial') {
    const mode = slot.dataset.mode;

    if (mode === 'peek' && owner === 'player') {
      hideDrawnCard();
      discard.push(drawnCard);
      renderDiscardTop();
      removeCardHighlights();
      playerKnown.add(index);
      phase = 'peekAnim';
      peekCard('player', index, 3000).then(() => {
        endPlayerTurn();
      });
      return;
    }

    if (mode === 'swapSpecial') {
      if (owner === 'player' && swapSpecialStep !== 'pickOpponent') {
        swapSpecialStep = 'pickOpponent';
        swapSpecialOwnIndex = index;
        slot.classList.add('selected');
        slot.classList.remove('glow-hint');
        setStatus('pickOpponent');

        const compCont = document.getElementById('compCards');
        Array.from(compCont.children).forEach(cs => {
          cs.classList.add('glow-hint');
          cs.dataset.mode = 'swapSpecialTarget';
          cs.onclick = () => handleCardClick('computer', parseInt(cs.dataset.index), cs);
        });
        return;
      }
    }

    if ((mode === 'swapSpecialTarget' || slot.dataset.mode === 'swapSpecialTarget') && owner === 'computer') {
      hideDrawnCard();
      discard.push(drawnCard);
      renderDiscardTop();

      const pi = swapSpecialOwnIndex;
      const ci = index;
      const temp = playerHand[pi];
      playerHand[pi] = compHand[ci];
      compHand[ci] = temp;

      if (!compHand[ci].special) compMemory.comp[ci] = compHand[ci].value;

      swapSpecialStep = null;
      swapSpecialOwnIndex = null;
      removeCardHighlights();

      const pSlot = document.getElementById('playerCards').children[pi];
      const cSlot = document.getElementById('compCards').children[ci];
      if (pSlot) pSlot.classList.add('swapping');
      if (cSlot) cSlot.classList.add('swapping');

      setTimeout(() => {
        renderPlayerCards();
        renderCompCards();
        endPlayerTurn();
      }, 700);
      return;
    }
  }
}

function discardDrawn() {
  discard.push(drawnCard);
  drawnCard = null;
  hideDrawnCard();
  renderDiscardTop();
  removeCardHighlights();
  swapSpecialStep = null;
  swapSpecialOwnIndex = null;
  endPlayerTurn();
}

// --- Draw 2 ---
function handleDraw2() {
  discard.push(drawnCard);
  renderDiscardTop();

  if (deck.length < 2) reshuffleDeck();
  const c1 = deck.pop();
  const c2 = deck.pop();
  updateDeckCount();

  const panel = document.getElementById('specialPanel');
  panel.innerHTML = `
    <h3 style="font-size:1.1rem;margin-bottom:12px">${t('draw2pick')}</h3>
    <div style="display:flex;justify-content:center;gap:16px">
      <div id="d2c1" class="card-slot" style="width:100px;height:140px;cursor:pointer" onclick="pickDraw2(0)">
        <div class="card-inner flipped">
          <div class="card-face card-back"><span class="paw-center">🐾</span></div>
          <div class="card-face card-front ${cardColorClass(c1)}">
            <div class="card-top-strip"></div>
            <span class="card-corner card-corner-tl" style="font-size:0.85rem">${c1.special ? '★' : c1.value}</span>
            <span class="card-emoji-main" style="font-size:2.2rem">${cardEmoji(c1)}</span>
            <span style="font-family:'Fredoka One',cursive;font-size:1.2rem">${c1.special ? '' : c1.value}</span>
            ${c1.special ? `<span class="card-type-label">${cardName(c1)}</span>` : ''}
          </div>
        </div>
      </div>
      <div id="d2c2" class="card-slot" style="width:100px;height:140px;cursor:pointer" onclick="pickDraw2(1)">
        <div class="card-inner flipped">
          <div class="card-face card-back"><span class="paw-center">🐾</span></div>
          <div class="card-face card-front ${cardColorClass(c2)}">
            <div class="card-top-strip"></div>
            <span class="card-corner card-corner-tl" style="font-size:0.85rem">${c2.special ? '★' : c2.value}</span>
            <span class="card-emoji-main" style="font-size:2.2rem">${cardEmoji(c2)}</span>
            <span style="font-family:'Fredoka One',cursive;font-size:1.2rem">${c2.special ? '' : c2.value}</span>
            ${c2.special ? `<span class="card-type-label">${cardName(c2)}</span>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('specialOverlay').classList.add('show');

  window._draw2Cards = [c1, c2];
}

window.pickDraw2 = function(idx) {
  const [c1, c2] = window._draw2Cards;
  const kept = idx === 0 ? c1 : c2;
  const discarded = idx === 0 ? c2 : c1;

  discard.push(discarded);
  document.getElementById('specialOverlay').classList.remove('show');
  renderDiscardTop();

  if (kept.special) {
    drawnCard = kept;
    showDrawnCard(kept);
    handleSpecialDraw(kept);
  } else {
    drawnCard = kept;
    showDrawnCard(kept);
    handleNumberDraw(kept);
  }
};

// --- End player turn ---
function endPlayerTurn() {
  phase = 'transition';
  if (chatchtulCaller && lastTurnFor === 'player') {
    setTimeout(() => revealAll(), 500);
    return;
  }
  if (chatchtulCaller && lastTurnFor === 'computer') {
    setTimeout(() => revealAll(), 500);
    return;
  }
  setTimeout(() => startCompTurn(), 400);
}

// --- Computer AI ---
function computerPlay() {
  if (phase !== 'compTurn') return;

  const memComp = compMemory.comp;
  const memPlayer = compMemory.player;

  let worstIdx = -1, worstVal = -1;
  for (const [idx, val] of Object.entries(memComp)) {
    if (typeof val === 'number' && val > worstVal) {
      worstVal = val;
      worstIdx = parseInt(idx);
    }
  }

  const topDiscard = discard.length > 0 ? discard[discard.length - 1] : null;
  const discardUseful = topDiscard && !topDiscard.special && topDiscard.value <= 3 && worstVal >= 5;

  if (discardUseful && worstIdx >= 0) {
    const taken = discard.pop();
    const old = compHand[worstIdx];
    compHand[worstIdx] = taken;
    compMemory.comp[worstIdx] = taken.value;
    discard.push(old);
    renderDiscardTop();
    renderCompCards();

    const slot = document.getElementById('compCards').children[worstIdx];
    if (slot) slot.classList.add('swapping');
    setTimeout(() => {
      renderCompCards();
      finishCompTurn();
    }, 700);
    return;
  }

  if (deck.length === 0) reshuffleDeck();
  const drawn = deck.pop();
  updateDeckCount();

  if (drawn.special) {
    compUseSpecial(drawn);
    return;
  }

  const drawVal = drawn.value;

  if (worstIdx >= 0 && drawVal < worstVal) {
    const old = compHand[worstIdx];
    compHand[worstIdx] = drawn;
    compMemory.comp[worstIdx] = drawVal;
    discard.push(old);
  } else if (difficulty !== 'hard' && Math.random() < 0.3 && drawVal <= 3) {
    const unknowns = [0,1,2,3].filter(i => !(i in memComp));
    if (unknowns.length > 0) {
      const ri = unknowns[Math.floor(Math.random() * unknowns.length)];
      const old = compHand[ri];
      compHand[ri] = drawn;
      compMemory.comp[ri] = drawVal;
      discard.push(old);
    } else {
      discard.push(drawn);
    }
  } else {
    discard.push(drawn);
  }

  renderDiscardTop();
  renderCompCards();
  updateDeckCount();

  setTimeout(() => {
    if (turnCount >= 4 && !chatchtulCaller) {
      const knownSum = Object.values(memComp).reduce((a, b) => typeof b === 'number' ? a + b : a, 0);
      const knownCount = Object.values(memComp).filter(v => typeof v === 'number').length;
      const estimatedTotal = knownCount === 4 ? knownSum : knownSum + (4 - knownCount) * 4;

      let threshold;
      if (difficulty === 'easy') threshold = 6;
      else if (difficulty === 'medium') threshold = 10;
      else threshold = 14;

      if (estimatedTotal <= threshold && knownCount >= (difficulty === 'easy' ? 4 : 3)) {
        callChatchtulComp();
        return;
      }
    }
    finishCompTurn();
  }, 400);
}

function compUseSpecial(card) {
  const type = card.value;

  if (type === CARD_TYPES.PEEK) {
    const unknowns = [0,1,2,3].filter(i => !(i in compMemory.comp));
    if (unknowns.length > 0) {
      const idx = unknowns[Math.floor(Math.random() * unknowns.length)];
      compMemory.comp[idx] = compHand[idx].special ? 10 : compHand[idx].value;
    }
    discard.push(card);
    renderDiscardTop();
    toast(lang === 'he' ? '🤖 המחשב הציץ בקלף' : '🤖 Computer peeked');
    setTimeout(() => finishCompTurn(), 800);
  } else if (type === CARD_TYPES.SWAP) {
    let worstIdx = -1, worstVal = -1;
    for (const [idx, val] of Object.entries(compMemory.comp)) {
      if (typeof val === 'number' && val > worstVal) { worstVal = val; worstIdx = parseInt(idx); }
    }
    if (worstIdx >= 0 && worstVal >= 5) {
      const pIdx = Math.floor(Math.random() * 4);
      const temp = compHand[worstIdx];
      compHand[worstIdx] = playerHand[pIdx];
      playerHand[pIdx] = temp;
      if (!compHand[worstIdx].special) compMemory.comp[worstIdx] = compHand[worstIdx].value;
      else delete compMemory.comp[worstIdx];

      const cSlot = document.getElementById('compCards').children[worstIdx];
      const pSlot = document.getElementById('playerCards').children[pIdx];
      if (cSlot) cSlot.classList.add('swapping');
      if (pSlot) pSlot.classList.add('swapping');

      discard.push(card);
      toast(lang === 'he' ? '🤖 המחשב החליף קלף!' : '🤖 Computer swapped a card!');
      setTimeout(() => {
        renderCompCards(); renderPlayerCards(); renderDiscardTop();
        finishCompTurn();
      }, 800);
    } else {
      discard.push(card);
      renderDiscardTop();
      setTimeout(() => finishCompTurn(), 400);
    }
  } else if (type === CARD_TYPES.DRAW2) {
    discard.push(card);
    if (deck.length < 2) reshuffleDeck();
    const c1 = deck.pop(), c2 = deck.pop();
    updateDeckCount();

    const v1 = c1.special ? 10 : c1.value;
    const v2 = c2.special ? 10 : c2.value;
    const kept = v1 <= v2 ? c1 : c2;
    const discarded = v1 <= v2 ? c2 : c1;
    discard.push(discarded);

    if (!kept.special) {
      let worstIdx = -1, worstVal = -1;
      for (const [idx, val] of Object.entries(compMemory.comp)) {
        if (typeof val === 'number' && val > worstVal) { worstVal = val; worstIdx = parseInt(idx); }
      }
      if (worstIdx >= 0 && kept.value < worstVal) {
        const old = compHand[worstIdx];
        compHand[worstIdx] = kept;
        compMemory.comp[worstIdx] = kept.value;
        discard.push(old);
      } else {
        discard.push(kept);
      }
    } else {
      discard.push(kept);
    }

    renderDiscardTop(); renderCompCards(); updateDeckCount();
    toast(lang === 'he' ? '🤖 המחשב שלף 2' : '🤖 Computer drew 2');
    setTimeout(() => finishCompTurn(), 600);
  }
}

function finishCompTurn() {
  if (chatchtulCaller && lastTurnFor === 'computer') {
    setTimeout(() => revealAll(), 500);
    return;
  }
  if (chatchtulCaller && lastTurnFor === 'player') {
    startPlayerTurn();
    return;
  }
  startPlayerTurn();
}

// --- Chatchtul! (with shockwave effect) ---
function callChatchtul() {
  if (phase !== 'playerTurn' || chatchtulCaller) return;
  chatchtulCaller = 'player';
  lastTurnFor = 'computer';

  const sw = document.createElement('div');
  sw.className = 'shockwave';
  document.body.appendChild(sw);
  setTimeout(() => sw.remove(), 900);

  const fl = document.createElement('div');
  fl.className = 'screen-flash';
  document.body.appendChild(fl);
  setTimeout(() => fl.remove(), 600);

  toast(t('chatchtulCalled'), 2500);
  enableChatchtul(false);
  setStatus('chatchtulCalled');

  setTimeout(() => {
    startCompTurn();
  }, 1500);
}

function callChatchtulComp() {
  chatchtulCaller = 'computer';
  lastTurnFor = 'player';

  const sw = document.createElement('div');
  sw.className = 'shockwave';
  document.body.appendChild(sw);
  setTimeout(() => sw.remove(), 900);

  toast(t('compCalledChatchtul'), 2500);
  setStatus('compCalledChatchtul');
  setTimeout(() => {
    startPlayerTurn();
  }, 1500);
}

// --- Reveal & Score ---
function revealAll() {
  phase = 'over';
  enablePiles(false);
  enableChatchtul(false);
  document.getElementById('compTurn').style.display = 'none';
  document.getElementById('playerTurn').style.display = 'none';

  let delay = 0;
  for (let i = 0; i < 4; i++) {
    setTimeout(() => flipCardPermanent('player', i), delay);
    setTimeout(() => flipCardPermanent('computer', i), delay + 200);
    delay += 400;
  }

  setTimeout(() => showScoreScreen(), delay + 600);
}

function calcScore(hand) {
  return hand.reduce((sum, c) => sum + (c.special ? 0 : c.value), 0);
}

function showScoreScreen() {
  let pScore = calcScore(playerHand);
  let cScore = calcScore(compHand);
  let bonusText = '';

  if (chatchtulCaller === 'player') {
    if (pScore <= cScore) {
      pScore -= 5;
      bonusText = t('callerBonus');
    } else {
      pScore += 10;
      bonusText = t('callerPenalty');
    }
  } else if (chatchtulCaller === 'computer') {
    if (cScore <= pScore) {
      cScore -= 5;
    } else {
      cScore += 10;
    }
  }

  const won = pScore < cScore;
  const tied = pScore === cScore;

  if (won) { record.w++; }
  else if (!tied) { record.l++; }
  localStorage.setItem('chatchtul-record', JSON.stringify(record));
  updateRecordUI();

  if (won) setTimeout(() => spawnConfetti(), 300);

  const panel = document.getElementById('scorePanel');
  panel.innerHTML = `
    <div class="result-emoji">${won ? '🎉' : tied ? '🤝' : '😿'}</div>
    <div class="score-title">${won ? t('youWin') : tied ? t('tie') : t('youLose')}</div>
    ${!won && !tied ? `<p style="font-size:0.78rem;color:rgba(255,255,255,0.35);margin:3px 0">${lang === 'he' ? 'בפעם הבאה!' : 'Next time!'}</p>` : ''}
    ${bonusText ? `<div style="font-size:0.78rem;color:#ffd93d;font-weight:700;margin:3px 0">${chatchtulCaller === 'player' ? t(pScore < cScore + 5 ? 'bonus' : 'penalty') : ''} ${bonusText}</div>` : ''}

    <div class="score-row" style="margin-top:10px">
      <div class="score-row-label">${t('yourScore')}</div>
      <div class="score-cards-reveal">
        ${playerHand.map(c => `<div class="score-card-mini"><div class="mini-strip" style="background:${miniStripColor(c)}"></div><span class="card-emoji">${cardEmoji(c)}</span><span class="card-value">${c.special ? '0' : c.value}</span></div>`).join('')}
      </div>
      <div class="score-total" style="color:${pScore <= cScore ? '#78d7a0' : '#f87171'}">${pScore}</div>
    </div>

    <div class="score-row">
      <div class="score-row-label">${t('compScore')}</div>
      <div class="score-cards-reveal">
        ${compHand.map(c => `<div class="score-card-mini"><div class="mini-strip" style="background:${miniStripColor(c)}"></div><span class="card-emoji">${cardEmoji(c)}</span><span class="card-value">${c.special ? '0' : c.value}</span></div>`).join('')}
      </div>
      <div class="score-total" style="color:${cScore <= pScore ? '#78d7a0' : '#f87171'}">${cScore}</div>
    </div>

    <div class="stats-card">
      <div class="stat">
        <div class="stat-num" style="color:#78d7a0">${record.w}</div>
        <div class="stat-label">${t('wins')}</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:#f87171">${record.l}</div>
        <div class="stat-label">${t('losses')}</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px">
      <button class="action-btn green" onclick="document.getElementById('scoreOverlay').classList.remove('show');startGame()" style="min-height:46px">${t('playAgain')}</button>
      <button class="action-btn secondary" onclick="document.getElementById('scoreOverlay').classList.remove('show');showScreen('menuScreen')" style="min-height:46px">${t('backToMenu')}</button>
    </div>
  `;

  document.getElementById('scoreOverlay').classList.add('show');
}

// --- Reshuffle ---
function reshuffleDeck() {
  if (discard.length <= 1) return;
  const top = discard.pop();
  deck = shuffle([...discard]);
  discard = [top];
  updateDeckCount();
  renderDiscardTop();
  toast(lang === 'he' ? '🔀 החפיסה עורבבה מחדש' : '🔀 Deck reshuffled');
}
</script>
