<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0628">
<title>חתחתול 🐱 Chatchtul</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;user-select:none;-webkit-user-select:none;background:#0a0118;color:white}
h1,h2,h3,.font-display{font-family:'Fredoka One',cursive}

/* ===== BACKGROUND — Deep purple/midnight blue with animated radial overlay ===== */
.bg-main{
  background:linear-gradient(160deg,#0f0628 0%,#1a0a4a 25%,#0d1b3e 50%,#1a0533 75%,#0a0118 100%);
  position:relative;overflow:hidden;min-height:100vh;min-height:100dvh;
}
.bg-main::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:
    radial-gradient(circle at 25% 25%,rgba(99,66,198,0.12) 0%,transparent 45%),
    radial-gradient(circle at 75% 60%,rgba(231,76,107,0.08) 0%,transparent 45%),
    radial-gradient(circle at 50% 85%,rgba(255,217,61,0.06) 0%,transparent 40%);
  animation:bgRotate 40s linear infinite;pointer-events:none;
}
@keyframes bgRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* ===== FLOATING PARTICLES ===== */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;font-size:1.2rem;opacity:0;
  animation:particleFloat linear infinite;
}
@keyframes particleFloat{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0}
  10%{opacity:0.25}
  90%{opacity:0.25}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

/* ===== GLASS MORPHISM ===== */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}
.glass-strong{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

/* ===== TOP BAR — glass morphism circles ===== */
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;position:relative;z-index:10;
}
.back-btn{
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  color:white;cursor:pointer;font-size:1.1rem;
  transition:all 0.3s;text-decoration:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.back-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.12)}
.lang-btn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  color:white;cursor:pointer;font-weight:900;font-size:0.75rem;
  font-family:'Nunito',sans-serif;transition:all 0.3s;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.lang-btn:hover{transform:scale(1.1);background:rgba(255,255,255,0.12)}

/* ===== CONTAINER ===== */
.container{max-width:600px;margin:0 auto;padding:0 12px 24px;position:relative;z-index:1}

/* ===== TITLE ===== */
.title-gradient{
  background:linear-gradient(135deg,#fff 0%,#d4b8ff 30%,#ffb8d4 60%,#ffd6a0 80%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 4px 20px rgba(132,94,194,0.4));
  letter-spacing:-0.02em;
}

/* ===== SCREENS ===== */
.screen{display:none;flex-direction:column;align-items:center;gap:16px}
.screen.active{display:flex}

/* ===== CARD SYSTEM ===== */
.card-slot{
  width:76px;height:106px;border-radius:16px;position:relative;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  perspective:800px;flex-shrink:0;
}
.card-slot:hover{transform:translateY(-6px)}
.card-slot:active{transform:scale(0.93)}
.card-slot.selected{
  box-shadow:0 0 0 3px rgba(255,217,61,0.9),0 0 25px rgba(255,217,61,0.4),0 0 50px rgba(255,217,61,0.15);
}
.card-slot.glow-hint{animation:glowHint 1.5s ease-in-out infinite}
@keyframes glowHint{
  0%,100%{box-shadow:0 0 8px rgba(255,217,61,0.15),0 0 20px rgba(255,217,61,0.05)}
  50%{box-shadow:0 0 15px rgba(255,217,61,0.5),0 0 35px rgba(255,217,61,0.2)}
}

/* Computer cards — smaller */
.comp-area .card-slot{width:62px;height:86px}
.comp-area .card-back::before{font-size:1rem}
.comp-area .card-back::after{inset:4px;border-radius:8px}

/* Player cards — larger */
.player-area-cards .card-slot{width:80px;height:112px}
.player-area-cards .card-front .card-emoji{font-size:2rem}
.player-area-cards .card-front .card-value{font-size:1.4rem}

.card-inner{
  width:100%;height:100%;position:relative;
  transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style:preserve-3d;
}
.card-inner.flipped{transform:rotateY(180deg)}

.card-face{
  position:absolute;width:100%;height:100%;border-radius:16px;
  backface-visibility:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;overflow:hidden;
}

/* ===== CARD BACK — Rich purple with paw print CSS pattern ===== */
.card-back{
  background:linear-gradient(145deg,#5b2d8e,#7b42b8,#5b2d8e);
  border:2px solid rgba(255,255,255,0.12);
  box-shadow:inset 0 2px 15px rgba(0,0,0,0.3),0 4px 20px rgba(0,0,0,0.3);
  overflow:hidden;
}
.card-back::before{
  content:'🐾';position:absolute;font-size:1.5rem;opacity:0.15;
  text-shadow:0 0 10px rgba(255,255,255,0.1);
}
.card-back::after{
  content:'';position:absolute;inset:5px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,0.08);
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04) 2px, transparent 2px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 2px, transparent 2px),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04) 2px, transparent 2px),
    radial-gradient(circle at 30% 70%, rgba(255,255,255,0.03) 2px, transparent 2px),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,0.04) 2px, transparent 2px);
}

/* ===== CARD FRONT ===== */
.card-front{
  transform:rotateY(180deg);
  border:2px solid rgba(255,255,255,0.2);
  box-shadow:0 6px 25px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);
}
.card-front .card-emoji{font-size:1.8rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.card-front .card-value{
  font-size:1.3rem;font-family:'Fredoka One',cursive;
  margin-top:2px;text-shadow:0 2px 6px rgba(0,0,0,0.4);
  letter-spacing:0.02em;
}
.card-front .card-label{
  font-size:0.55rem;font-weight:800;text-transform:uppercase;
  letter-spacing:0.08em;opacity:0.7;margin-top:1px;
}

/* ===== CARD COLORS BY VALUE ===== */
/* Low cards (0-2): Green gradient, cute cat */
.card-cat{
  background:linear-gradient(145deg,#1db954,#0d9e3f,#1db954);
  border-color:rgba(29,185,84,0.4);
}
.card-cat::before{
  content:'MEOW';position:absolute;bottom:3px;
  font-size:0.45rem;font-weight:900;letter-spacing:0.15em;
  color:rgba(255,255,255,0.2);font-family:'Fredoka One',cursive;
}

/* Mid cards (3-5): Yellow/amber gradient */
.card-mid{
  background:linear-gradient(145deg,#f0a030,#d4880c,#f0a030);
  border-color:rgba(240,160,48,0.4);
}

/* High cards (6-8): Red gradient, sneaky rat */
.card-rat{
  background:linear-gradient(145deg,#e84040,#c52020,#e84040);
  border-color:rgba(232,64,64,0.4);
}

/* Card 9: Dark crimson, evil rat */
.card-super-rat{
  background:linear-gradient(145deg,#8b0000,#5c0000,#8b0000);
  border-color:rgba(139,0,0,0.6);
  box-shadow:0 6px 25px rgba(139,0,0,0.5),inset 0 0 20px rgba(0,0,0,0.3);
}

/* Special cards: Blue/purple gradient with power icon */
.card-special{
  background:linear-gradient(145deg,#4a6cf7,#7c3aed,#4a6cf7);
  border-color:rgba(124,58,237,0.4);
}
.card-special::before{
  content:'✦';position:absolute;top:4px;right:6px;
  font-size:0.5rem;color:rgba(255,255,255,0.25);
}

/* ===== PEEK TIMER RING ===== */
.peek-timer{position:absolute;top:-6px;right:-6px;width:28px;height:28px;z-index:5;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.peek-timer circle{fill:none;stroke-width:3;transform:rotate(-90deg);transform-origin:center}
.peek-timer .bg{stroke:rgba(255,255,255,0.15)}
.peek-timer .progress{stroke:#ffd93d;stroke-dasharray:62.83;stroke-dashoffset:0;transition:stroke-dashoffset 0.1s linear;stroke-linecap:round}
.card-slot.peeking{
  box-shadow:0 0 20px rgba(255,217,61,0.5),0 0 40px rgba(255,217,61,0.2);
  animation:peekGlow 0.8s ease-in-out infinite;
}
@keyframes peekGlow{
  0%,100%{box-shadow:0 0 20px rgba(255,217,61,0.5),0 0 40px rgba(255,217,61,0.2)}
  50%{box-shadow:0 0 30px rgba(255,217,61,0.7),0 0 60px rgba(255,217,61,0.3)}
}

/* ===== PLAYER AREAS ===== */
.player-area{
  width:100%;padding:14px 12px;border-radius:22px;text-align:center;
  transition:border-color 0.3s;
}
.player-label{
  font-family:'Fredoka One',cursive;font-size:0.95rem;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.cards-row{display:flex;justify-content:center;gap:10px}

.comp-area{border-color:rgba(231,76,60,0.15)!important}
.comp-area .cards-row{gap:8px}
.player-area-cards{border-color:rgba(46,204,113,0.15)!important}
.player-area-cards .cards-row{gap:12px}

/* ===== CENTER AREA — Draw & Discard with glow ===== */
.center-area{
  display:flex;align-items:center;justify-content:center;gap:28px;
  padding:14px 0;width:100%;
}
.pile{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:all 0.25s;
}
.pile:hover{transform:scale(1.08)}
.pile:active{transform:scale(0.95)}
.pile-card{
  width:68px;height:95px;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:box-shadow 0.3s;
}
.pile-label{font-size:0.7rem;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.03em}
.draw-count{position:absolute;bottom:5px;font-size:0.6rem;font-weight:900;color:rgba(255,255,255,0.5)}

/* Glow effects on piles */
.pile:hover .pile-card{
  box-shadow:0 0 20px rgba(132,94,194,0.4),0 0 40px rgba(132,94,194,0.15);
}
#drawPile .pile-card{
  box-shadow:0 4px 20px rgba(91,45,142,0.4);
}
#discardPile .pile-card{
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

/* ===== VS DIVIDER ===== */
.vs-divider{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:2px 0;opacity:0.3;
}
.vs-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent)}
.vs-text{font-family:'Fredoka One',cursive;font-size:0.7rem;color:rgba(255,255,255,0.4)}

/* ===== ACTION BUTTONS ===== */
.action-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;width:100%;padding:4px 0}
.action-btn{
  padding:12px 22px;border-radius:18px;border:none;color:white;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.85rem;
  cursor:pointer;transition:all 0.25s;min-height:50px;min-width:56px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  position:relative;overflow:hidden;
}
.action-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 50%);
  border-radius:18px;pointer-events:none;
}
.action-btn:hover{transform:translateY(-3px)}
.action-btn:active{transform:scale(0.95)}
.action-btn:disabled{opacity:0.25;cursor:not-allowed;transform:none!important}
.action-btn.primary{background:linear-gradient(145deg,#e74c3c,#c0392b);box-shadow:0 4px 20px rgba(231,76,60,0.35)}
.action-btn.secondary{background:linear-gradient(145deg,#6b3fa0,#8b5fbf);box-shadow:0 4px 20px rgba(107,63,160,0.35)}
.action-btn.gold{background:linear-gradient(145deg,#f39c12,#e67e22);box-shadow:0 4px 20px rgba(243,156,18,0.35)}
.action-btn.green{background:linear-gradient(145deg,#1db954,#17a44a);box-shadow:0 4px 20px rgba(29,185,84,0.35)}

/* ===== CHATCHTUL BUTTON — dramatic pulsing ===== */
.chatchtul-btn{
  background:linear-gradient(145deg,#ff4757,#c0392b,#e74c3c)!important;
  box-shadow:0 6px 30px rgba(231,76,60,0.5)!important;
  font-size:1.05rem!important;padding:14px 28px!important;
  border:2px solid rgba(255,255,255,0.15)!important;
  letter-spacing:0.03em;
}
.chatchtul-btn.ready{animation:chatchtulPulse 2s ease-in-out infinite}
@keyframes chatchtulPulse{
  0%,100%{
    box-shadow:0 6px 30px rgba(231,76,60,0.5),0 0 0 0 rgba(231,76,60,0.4);
    transform:scale(1);
  }
  50%{
    box-shadow:0 8px 40px rgba(231,76,60,0.7),0 0 0 12px rgba(231,76,60,0);
    transform:scale(1.03);
  }
}

/* Shockwave effect on chatchtul call */
.shockwave{
  position:fixed;top:50%;left:50%;width:10px;height:10px;
  border-radius:50%;border:3px solid rgba(255,71,87,0.8);
  transform:translate(-50%,-50%);z-index:999;pointer-events:none;
  animation:shockwaveExpand 0.8s ease-out forwards;
}
@keyframes shockwaveExpand{
  0%{width:10px;height:10px;opacity:1;border-width:3px}
  100%{width:100vmax;height:100vmax;opacity:0;border-width:1px}
}
.screen-flash{
  position:fixed;inset:0;background:rgba(255,71,87,0.15);z-index:998;
  pointer-events:none;animation:flashFade 0.5s ease-out forwards;
}
@keyframes flashFade{0%{opacity:1}100%{opacity:0}}

/* ===== STATUS MESSAGE ===== */
.status-msg{
  text-align:center;font-weight:700;font-size:0.9rem;
  color:rgba(255,255,255,0.6);min-height:26px;padding:6px 16px;
  line-height:1.3;letter-spacing:0.01em;
}

/* ===== DRAWN CARD DISPLAY ===== */
.drawn-card-display{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:100;transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  pointer-events:none;
}
.drawn-card-display.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.drawn-card-big{
  width:130px;height:182px;border-radius:22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:3px solid rgba(255,255,255,0.25);
  box-shadow:0 25px 80px rgba(0,0,0,0.6),0 0 40px rgba(132,94,194,0.2);
}
.drawn-card-big .card-emoji{font-size:3.8rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
.drawn-card-big .card-value{font-size:2rem;font-family:'Fredoka One',cursive;margin-top:4px;text-shadow:0 2px 8px rgba(0,0,0,0.4)}
.drawn-card-big .card-name{font-size:0.85rem;font-weight:800;margin-top:2px;opacity:0.8}
.drawn-card-big .card-label{font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;opacity:0.5;margin-top:2px}
.drawn-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.drawn-overlay.show{opacity:1;pointer-events:auto}

/* ===== SWAP ANIMATION — arc trajectory ===== */
.card-slot.swapping{animation:swapArc 0.7s cubic-bezier(0.4,0,0.2,1)}
@keyframes swapArc{
  0%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}
  25%{transform:translateY(-50px) scale(1.15) rotate(-5deg);opacity:0.8}
  50%{transform:translateY(-30px) translateX(20px) scale(1.1) rotate(3deg);opacity:0.6}
  75%{transform:translateY(20px) scale(0.95) rotate(-2deg);opacity:0.8}
  100%{transform:translateY(0) scale(1) rotate(0deg);opacity:1}
}

/* ===== SCORE OVERLAY / END SCREEN ===== */
.score-overlay{
  position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.score-overlay.show{display:flex}
.score-panel{
  width:92%;max-width:420px;border-radius:28px;padding:28px 22px;
  text-align:center;animation:scoreSlideIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275);
  background:rgba(255,255,255,0.07);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
@keyframes scoreSlideIn{
  0%{transform:translateY(60px) scale(0.8);opacity:0}
  60%{transform:translateY(-10px) scale(1.02)}
  100%{transform:translateY(0) scale(1);opacity:1}
}
.score-title{font-size:2.4rem;font-family:'Fredoka One',cursive;margin-bottom:4px}
.score-subtitle{font-size:0.9rem;color:rgba(255,255,255,0.4);margin-bottom:16px}
.score-cards-reveal{display:flex;justify-content:center;gap:8px;margin:10px 0}
.score-card-mini{
  width:56px;height:78px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,0.15);font-size:0.7rem;font-weight:800;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  animation:cardRevealPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) backwards;
}
.score-card-mini:nth-child(1){animation-delay:0.1s}
.score-card-mini:nth-child(2){animation-delay:0.25s}
.score-card-mini:nth-child(3){animation-delay:0.4s}
.score-card-mini:nth-child(4){animation-delay:0.55s}
@keyframes cardRevealPop{0%{transform:scale(0) rotate(-10deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
.score-card-mini .card-emoji{font-size:1.4rem}
.score-card-mini .card-value{font-size:1rem;font-family:'Fredoka One',cursive}
.score-total{font-size:1.6rem;font-family:'Fredoka One',cursive;margin:4px 0}
.score-row{margin-bottom:16px}
.score-row-label{font-size:0.8rem;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.03em}
.result-emoji{font-size:4.5rem;margin:8px 0;animation:resultBounce 0.6s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes resultBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

/* Stats glass card */
.stats-card{
  display:flex;justify-content:center;gap:24px;
  padding:10px 20px;border-radius:14px;margin:10px 0 4px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
}
.stats-card .stat{text-align:center}
.stats-card .stat-num{font-family:'Fredoka One',cursive;font-size:1.1rem}
.stats-card .stat-label{font-size:0.65rem;color:rgba(255,255,255,0.4);font-weight:700}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;width:8px;height:8px;z-index:999;pointer-events:none;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ===== RECORD BAR ===== */

/* ===== THINKING DOTS ===== */
.thinking-dots span{display:inline-block;animation:thinkDot 1.4s infinite;opacity:0.3;font-size:1.2em}

/* ===== TOAST ===== */
.toast{

/* ===== SPECIAL CARD OVERLAY ===== */
.special-overlay{

<script>
// ============================================================
// CHATCHTUL GAME - Complete Implementation

// --- Floating Particles ---
(function initParticles() {
  const container = document.getElementById('particles');
  const emojis = ['🐱','🐀','🐾','✨','🐱','🐾','✨','🐀','🐾','✨'];

    p.style.animationDelay = (Math.random() * 15) + 's';
    container.appendChild(p);
  }
})();

// --- Confetti ---
function spawnConfetti() {
  const colors = ['#ffd93d','#ff6b6b','#4ade80','#60a5fa','#f472b6','#c084fc','#fb923c'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = (Math.random() * 100) + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.width = (4 + Math.random() * 8) + 'px';
    c.style.height = (4 + Math.random() * 8) + 'px';
    c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// --- Internationalization ---
let lang = localStorage.getItem('keren-lang') || 'he';
const T = {
  he: {
    yourTurnDraw: 'תורך! שלוף קלף מהחפיסה או מערימת השליכה',

    pickOpponent: 'עכשיו בחר קלף של המחשב',

    chatchtulCalled: '🐱 חתחתול! קראת חתחתול!',

    bonus: 'בונוס קורא חתחתול!',
    penalty: 'עונש - קראת חתחתול אבל לא ניצחת!',
    playAgain: '🔄 שחק שוב',
    backToMenu: '🏠 תפריט',
    callerBonus: '(-5 בונוס)',
    callerPenalty: '(+10 עונש)',

    draw2pick: 'בחר קלף לשמור',
    rulesTitle: 'חוקי חתחתול',
    ruleGoal: 'המטרה: צבור את הניקוד הנמוך ביותר!',
    ruleCards: 'קלפים 0-2 (חתולים) = טובים, 6-9 (עכברושים) = רעים',
    rulePeek: 'בתחילת המשחק תראה 2 מתוך 4 קלפים שלך',
    ruleTurn: 'בכל תור: שלוף מהחפיסה או קח מערימת השליכה',
    ruleSwapOrDiscard: 'אם שלפת מספר: החלף עם קלף שלך או השלך',
    ruleSpecials: 'קלפים מיוחדים: הצצה, החלפה, שלוף 2',
    ruleEnd: 'קרא "חתחתול!" לסיים - אם הנמוך ביותר, בונוס! אם לא, עונש!',
    close: 'סגור',
    you: 'את/ה',
    computer: 'מחשב',
    wins: 'ניצחונות',
    losses: 'הפסדים',
  },
  en: {
    yourTurnDraw: 'Your turn! Draw from deck or discard pile',
    memorize: 'Memorize your cards! ({s} sec)',
    compThinking: 'Computer is thinking...',
    drawnNumber: 'Drew {v}! Swap with one of your cards or discard',
    drawnSpecialPeek: 'Drew Peek! Pick one of your cards to peek, or discard',
    drawnSpecialSwap: 'Drew Swap! Pick your card then opponent\'s, or discard',
    drawnSpecialDraw2: 'Drew Draw 2! Pick the better card',
    discardIt: 'Discard',
    swapWith: 'Pick your card to swap',
    pickOpponent: 'Now pick an opponent\'s card',
    peekingCard: 'Peeking... ({s}s)',
    chatchtulCalled: '🐱 Chatchtul! You called it!',
    compCalledChatchtul: '🤖 Computer called Chatchtul!',
    lastTurn: 'Last turn! Draw from deck or discard',
    youWin: 'You Win! 🎉',
    youLose: 'You Lose 😿',
    tie: 'It\'s a Tie! 🤝',
    yourScore: 'Your Score',
    compScore: 'Computer Score',
    bonus: 'Chatchtul caller bonus!',
    penalty: 'Penalty - called Chatchtul but didn\'t win!',
    playAgain: '🔄 Play Again',
    backToMenu: '🏠 Menu',
    callerBonus: '(-5 bonus)',
    callerPenalty: '(+10 penalty)',
    keepCard: 'Keep',
    draw2pick: 'Pick a card to keep',
    rulesTitle: 'How to Play Chatchtul',
    ruleGoal: 'Goal: Get the lowest total score!',
    ruleCards: 'Cards 0-2 (cats) = good, 6-9 (rats) = bad',
    rulePeek: 'At the start you see 2 of your 4 cards',
    ruleTurn: 'Each turn: draw from deck or take from discard pile',
    ruleSwapOrDiscard: 'If you drew a number: swap with your card or discard',
    ruleSpecials: 'Special cards: Peek, Swap, Draw 2',
    ruleEnd: 'Call "Chatchtul!" to end - if lowest score, bonus! If not, penalty!',
    close: 'Close',
    you: 'You',
    computer: 'Computer',
    wins: 'Wins',
    losses: 'Losses',
  }
};
function t(key, replacements) {
  let s = T[lang][key] || key;
  if (replacements) Object.entries(replacements).forEach(([k,v]) => s = s.replace(`{${k}}`, v));
  return s;
}

function toggleLang() {
  lang = lang === 'he' ? 'en' : 'he';
  localStorage.setItem('keren-lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = lang === 'he' ? 'EN' : 'עב';
  document.querySelectorAll('[data-he]').forEach(el => {
    el.textContent = el.getAttribute(lang === 'he' ? 'data-he' : 'data-en');
  });
  if (statusKey) setStatus(statusKey, statusReplacements);
}

let statusKey = '', statusReplacements = {};
function setStatus(key, rep) {
  statusKey = key; statusReplacements = rep || {};
  document.getElementById('statusMsg').textContent = t(key, rep);
}

// Init lang
(function initLang() {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = lang === 'he' ? 'EN' : 'עב';
  if (lang === 'en') {
    document.querySelectorAll('[data-en]').forEach(el => {
      el.textContent = el.getAttribute('data-en');
    });
  }
})();

// --- Card data ---
const CARD_TYPES = {
  PEEK: 'peek',
  SWAP: 'swap',
  DRAW2: 'draw2',
};

function makeCard(value) {
  if (typeof value === 'string') return { value, special: true };
  return { value, special: false };
}

function cardEmoji(card) {
  if (card.special) {
    if (card.value === CARD_TYPES.PEEK) return '👁️';
    if (card.value === CARD_TYPES.SWAP) return '🔄';
    if (card.value === CARD_TYPES.DRAW2) return '🃏';
  }
  if (card.value <= 2) return '🐱';
  if (card.value <= 5) return ['🐶','🐰','🐸'][card.value - 3] || '🐾';
  if (card.value <= 8) return '🐀';
  return '🐀';
}

function cardName(card) {
  if (card.special) {
    if (card.value === CARD_TYPES.PEEK) return lang === 'he' ? 'הצצה' : 'Peek';
    if (card.value === CARD_TYPES.SWAP) return lang === 'he' ? 'החלפה' : 'Swap';
    if (card.value === CARD_TYPES.DRAW2) return lang === 'he' ? 'שלוף 2' : 'Draw 2';
  }
  return card.value.toString();
}

function cardColorClass(card) {
  if (card.special) return 'card-special';
  if (card.value <= 2) return 'card-cat';
  if (card.value <= 5) return 'card-mid';
  if (card.value <= 8) return 'card-rat';
  return 'card-super-rat';
}

function cardSubLabel(card) {
  if (card.special) {
    if (card.value === CARD_TYPES.PEEK) return '👁️';
    if (card.value === CARD_TYPES.SWAP) return '🔄';
    if (card.value === CARD_TYPES.DRAW2) return '🃏';
  }
  if (card.value <= 2) return 'MEOW';
  if (card.value <= 5) return '';
  if (card.value === 9) return '💀';
  return '';
}

function buildDeck() {
  const deck = [];
  for (let v = 0; v <= 9; v++) {
    for (let i = 0; i < 4; i++) deck.push(makeCard(v));
  }
  for (let i = 0; i < 2; i++) {
    deck.push(makeCard(CARD_TYPES.PEEK));
    deck.push(makeCard(CARD_TYPES.SWAP));
    deck.push(makeCard(CARD_TYPES.DRAW2));
  }
  return deck;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// --- Game State ---
let deck, discard, playerHand, compHand;
let playerKnown, compKnown;
let compMemory;
let phase;
let drawnCard;
let difficulty = 'easy';
let chatchtulCaller = null;
let lastTurnFor = null;
let turnCount = 0;

// --- Records ---
let record = JSON.parse(localStorage.getItem('chatchtul-record') || '{"w":0,"l":0}');
function updateRecordUI() {
  document.getElementById('recWins').textContent = record.w;
  document.getElementById('recLosses').textContent = record.l;
}
updateRecordUI();

// --- Difficulty ---
function setDiff(d, btn) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// --- Screens ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- Rules ---
function showRules() {
  const rc = document.getElementById('rulesContent');
  rc.innerHTML = `
    <h2 style="font-size:1.5rem;text-align:center;margin-bottom:12px">${t('rulesTitle')}</h2>
    <ul style="display:flex;flex-direction:column;gap:8px">
      <li>${t('ruleGoal')}</li>

// --- Flip a card temporarily (peek with glow + timer ring) ---
function peekCard(owner, index, duration = 3000) {
  return new Promise(resolve => {
    const cont = owner === 'player' ? document.getElementById('playerCards') : document.getElementById('compCards');
    const slot = cont.children[index];
    if (!slot) { resolve(); return; }
    const inner = slot.querySelector('.card-inner');
    inner.classList.add('flipped');
    slot.classList.add('peeking');

    // Timer ring SVG
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.classList.add('peek-timer');
    svg.setAttribute('viewBox', '0 0 24 24');
    const bgC = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    bgC.classList.add('bg'); bgC.setAttribute('cx','12'); bgC.setAttribute('cy','12'); bgC.setAttribute('r','10');
    const prC = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    prC.classList.add('progress'); prC.setAttribute('cx','12'); prC.setAttribute('cy','12'); prC.setAttribute('r','10');
    svg.appendChild(bgC); svg.appendChild(prC);
    slot.appendChild(svg);

    const totalMs = duration;
    const step = 50;
    let elapsed = 0;
    const interval = setInterval(() => {
      elapsed += step;
      const frac = elapsed / totalMs;
      prC.style.strokeDashoffset = (62.83 * frac).toFixed(2);
      if (elapsed >= totalMs) {
        clearInterval(interval);
        inner.classList.remove('flipped');
        slot.classList.remove('peeking');
        svg.remove();
        resolve();
      }
    }, step);
  });
}

// Flip card permanently (for end game reveal)
function flipCardPermanent(owner, index) {
  const cont = owner === 'player' ? document.getElementById('playerCards') : document.getElementById('compCards');
  const slot = cont.children[index];
  if (!slot) return;
  slot.querySelector('.card-inner').classList.add('flipped');
}

// --- Start Game ---
function startGame() {
  deck = shuffle(buildDeck());
  discard = [];
  playerHand = []; compHand = [];
  playerKnown = new Set();
  compKnown = new Set();
  compMemory = { player: {}, comp: {} };
  chatchtulCaller = null;
  lastTurnFor = null;
  turnCount = 0;
  phase = 'dealing';

  // Deal 4 to each, ensuring no specials in initial hands
  let dealing = true;
  while (dealing) {
    deck = shuffle(buildDeck());
    playerHand = []; compHand = [];
    let ok = true;
    for (let i = 0; i < 4; i++) {
      const pc = deck.pop();
      if (pc.special) { ok = false; break; }
      playerHand.push(pc);
    }
    if (!ok) continue;
    for (let i = 0; i < 4; i++) {
      const cc = deck.pop();
      if (cc.special) { ok = false; break; }
      compHand.push(cc);
    }
    if (ok) dealing = false;
  }

  // Discard first card (ensure not special)
  let firstDiscard = deck.pop();
  while (firstDiscard.special) {
    deck.unshift(firstDiscard);
    shuffle(deck);
    firstDiscard = deck.pop();
  }
  discard.push(firstDiscard);

  showScreen('gameScreen');
  renderPlayerCards();
  renderCompCards();
  renderDiscardTop();
  updateDeckCount();

  // Computer memorizes its own edge cards
  compMemory.comp[0] = compHand[0].value;
  compMemory.comp[3] = compHand[3].value;

  // Memorize phase
  phase = 'memorize';
  enableChatchtul(false);
  document.getElementById('compTurn').style.display = 'none';
  document.getElementById('playerTurn').style.display = 'none';

  // Show player's leftmost and rightmost
  const dur = 5000;
  setStatus('memorize', { s: '5' });

  let timeLeft = 5;
  const countdown = setInterval(() => {
    timeLeft--;
    if (timeLeft > 0) setStatus('memorize', { s: String(timeLeft) });
  }, 1000);

  Promise.all([
    peekCard('player', 0, dur),
    peekCard('player', 3, dur)
  ]).then(() => {
    clearInterval(countdown);
    playerKnown.add(0);
    playerKnown.add(3);
    startPlayerTurn();
  });
}

// --- Turn management ---

  phase = 'playerTurn';
  turnCount++;
  document.getElementById('compTurn').style.display = 'none';
  document.getElementById('playerTurn').style.display = 'inline-flex';
  enableChatchtul(turnCount >= 2);
  enablePiles(true);
  removeCardHighlights();

  if (lastTurnFor === 'player') {
    setStatus('lastTurn');
  } else {
    setStatus('yourTurnDraw');
  }
}

function startCompTurn() {
  phase = 'compTurn';
  turnCount++;
  document.getElementById('playerTurn').style.display = 'none';
  document.getElementById('compTurn').style.display = 'inline-flex';
  enableChatchtul(false);
  enablePiles(false);
  removeCardHighlights();
  setStatus('compThinking');

  const delay = 800 + Math.random() * 1200;
  setTimeout(() => computerPlay(), delay);
}

function enablePiles(on) {

  document.getElementById('discardPile').style.pointerEvents = on ? 'auto' : 'none';

}

function removeCardHighlights() {

// --- Draw from deck ---
function drawFromDeck() {
  if (phase !== 'playerTurn') return;
  if (deck.length === 0) { reshuffleDeck(); }
  drawnCard = deck.pop();
  updateDeckCount();
  enablePiles(false);

  showDrawnCard(drawnCard);

  if (drawnCard.special) {
    handleSpecialDraw(drawnCard);
  } else {
    handleNumberDraw(drawnCard);
  }
}

function drawFromDiscard() {
  if (phase !== 'playerTurn') return;
  if (discard.length === 0) return;
  drawnCard = discard.pop();
  renderDiscardTop();
  enablePiles(false);

  showDrawnCard(drawnCard);

  if (drawnCard.special) {
    handleSpecialDraw(drawnCard);
  } else {
    handleNumberDrawFromDiscard(drawnCard);
  }
}

function handleNumberDraw(card) {
  phase = 'playerDrew';
  setStatus('drawnNumber', { v: card.value });

  const actions = document.getElementById('drawnActions');
  actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:48px">${t('discardIt')}</button>`;

  highlightPlayerCards('swap');
}

function handleNumberDrawFromDiscard(card) {
  phase = 'playerDrew';
  setStatus('drawnNumber', { v: card.value });

  const actions = document.getElementById('drawnActions');
  actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:48px">${t('discardIt')}</button>`;

  highlightPlayerCards('swap');
}

function handleSpecialDraw(card) {
  phase = 'playerSpecial';
  const type = card.value;

  if (type === CARD_TYPES.PEEK) {
    setStatus('drawnSpecialPeek');
    const actions = document.getElementById('drawnActions');
    actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:48px">${t('discardIt')}</button>`;
    highlightPlayerCards('peek');
  } else if (type === CARD_TYPES.SWAP) {
    setStatus('drawnSpecialSwap');
    const actions = document.getElementById('drawnActions');
    actions.innerHTML = `<button class="action-btn secondary" onclick="discardDrawn()" style="min-height:48px">${t('discardIt')}</button>`;
    highlightPlayerCards('swapSpecial');
  } else if (type === CARD_TYPES.DRAW2) {
    setStatus('drawnSpecialDraw2');
    hideDrawnCard();
    handleDraw2();
  }
}

function highlightPlayerCards(mode) {
  const cont = document.getElementById('playerCards');
  Array.from(cont.children).forEach(slot => {
    slot.classList.add('glow-hint');
    slot.dataset.mode = mode;
  });
}

// --- Handle card clicks ---
let swapSpecialStep = null;
let swapSpecialOwnIndex = null;

function handleCardClick(owner, index, slot) {
  if (phase === 'playerDrew' && owner === 'player') {
    const old = playerHand[index];
    playerHand[index] = drawnCard;
    discard.push(old);
    playerKnown.add(index);

    hideDrawnCard();
    renderPlayerCards();
    renderDiscardTop();
    removeCardHighlights();

    peekCard('player', index, 1500).then(() => {
      endPlayerTurn();
    });
    return;
  }

  if (phase === 'playerSpecial') {
    const mode = slot.dataset.mode;

    if (mode === 'peek' && owner === 'player') {
      hideDrawnCard();
      discard.push(drawnCard);
      renderDiscardTop();
      removeCardHighlights();
      playerKnown.add(index);
      phase = 'peekAnim';
      peekCard('player', index, 3000).then(() => {
        endPlayerTurn();
      });
      return;
    }

    if (mode === 'swapSpecial') {
      if (owner === 'player' && swapSpecialStep !== 'pickOpponent') {
        swapSpecialStep = 'pickOpponent';
        swapSpecialOwnIndex = index;
        slot.classList.add('selected');
        slot.classList.remove('glow-hint');
        setStatus('pickOpponent');

        const compCont = document.getElementById('compCards');
        Array.from(compCont.children).forEach(cs => {
          cs.classList.add('glow-hint');
          cs.dataset.mode = 'swapSpecialTarget';
          cs.onclick = () => handleCardClick('computer', parseInt(cs.dataset.index), cs);
        });
        return;
      }
    }

    if ((mode === 'swapSpecialTarget' || slot.dataset.mode === 'swapSpecialTarget') && owner === 'computer') {
      hideDrawnCard();
      discard.push(drawnCard);
      renderDiscardTop();

      const pi = swapSpecialOwnIndex;
      const ci = index;
      const temp = playerHand[pi];
      playerHand[pi] = compHand[ci];
      compHand[ci] = temp;

      if (!compHand[ci].special) compMemory.comp[ci] = compHand[ci].value;

      swapSpecialStep = null;
      swapSpecialOwnIndex = null;
      removeCardHighlights();

      const pSlot = document.getElementById('playerCards').children[pi];
      const cSlot = document.getElementById('compCards').children[ci];
      if (pSlot) pSlot.classList.add('swapping');
      if (cSlot) cSlot.classList.add('swapping');

      setTimeout(() => {
        renderPlayerCards();
        renderCompCards();
        endPlayerTurn();
      }, 700);
      return;
    }
  }
}

function discardDrawn() {
  discard.push(drawnCard);
  drawnCard = null;
  hideDrawnCard();
  renderDiscardTop();
  removeCardHighlights();
  swapSpecialStep = null;
  swapSpecialOwnIndex = null;
  endPlayerTurn();
}

// --- Draw 2 ---
function handleDraw2() {
  discard.push(drawnCard);
  renderDiscardTop();

  if (deck.length < 2) reshuffleDeck();
  const c1 = deck.pop();
  const c2 = deck.pop();
  updateDeckCount();

  const panel = document.getElementById('specialPanel');
  panel.innerHTML = `
    <h3 style="font-size:1.2rem;margin-bottom:14px">${t('draw2pick')}</h3>
    <div style="display:flex;justify-content:center;gap:18px">
      <div id="d2c1" class="card-slot" style="width:95px;height:133px;cursor:pointer" onclick="pickDraw2(0)">
        <div class="card-inner flipped">
          <div class="card-face card-back"></div>
          <div class="card-face card-front ${cardColorClass(c1)}">
            <span class="card-emoji" style="font-size:2.4rem">${cardEmoji(c1)}</span>
            <span class="card-value" style="font-size:1.4rem">${c1.special ? '' : c1.value}</span>
            ${c1.special ? `<span class="card-name">${cardName(c1)}</span>` : ''}
          </div>
        </div>
      </div>
      <div id="d2c2" class="card-slot" style="width:95px;height:133px;cursor:pointer" onclick="pickDraw2(1)">
        <div class="card-inner flipped">
          <div class="card-face card-back"></div>
          <div class="card-face card-front ${cardColorClass(c2)}">
            <span class="card-emoji" style="font-size:2.4rem">${cardEmoji(c2)}</span>
            <span class="card-value" style="font-size:1.4rem">${c2.special ? '' : c2.value}</span>
            ${c2.special ? `<span class="card-name">${cardName(c2)}</span>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('specialOverlay').classList.add('show');

  window._draw2Cards = [c1, c2];
}

window.pickDraw2 = function(idx) {
  const [c1, c2] = window._draw2Cards;
  const kept = idx === 0 ? c1 : c2;
  const discarded = idx === 0 ? c2 : c1;

  discard.push(discarded);
  document.getElementById('specialOverlay').classList.remove('show');
  renderDiscardTop();

  if (kept.special) {
    drawnCard = kept;
    showDrawnCard(kept);
    handleSpecialDraw(kept);
  } else {
    drawnCard = kept;
    showDrawnCard(kept);
    handleNumberDraw(kept);
  }
};

// --- End player turn ---
function endPlayerTurn() {
  phase = 'transition';
  if (chatchtulCaller && lastTurnFor === 'player') {
    setTimeout(() => revealAll(), 500);
    return;
  }
  if (chatchtulCaller && lastTurnFor === 'computer') {
    setTimeout(() => revealAll(), 500);
    return;
  }
  setTimeout(() => startCompTurn(), 400);
}

// --- Computer AI ---
function computerPlay() {
  if (phase !== 'compTurn') return;

  const memComp = compMemory.comp;
  const memPlayer = compMemory.player;

  let worstIdx = -1, worstVal = -1;
  for (const [idx, val] of Object.entries(memComp)) {
    if (typeof val === 'number' && val > worstVal) {
      worstVal = val;
      worstIdx = parseInt(idx);
    }
  }

  const topDiscard = discard.length > 0 ? discard[discard.length - 1] : null;
  const discardUseful = topDiscard && !topDiscard.special && topDiscard.value <= 3 && worstVal >= 5;

  if (discardUseful && worstIdx >= 0) {
    const taken = discard.pop();
    const old = compHand[worstIdx];
    compHand[worstIdx] = taken;
    compMemory.comp[worstIdx] = taken.value;
    discard.push(old);
    renderDiscardTop();
    renderCompCards();

    const slot = document.getElementById('compCards').children[worstIdx];
    if (slot) slot.classList.add('swapping');
    setTimeout(() => {
      renderCompCards();
      finishCompTurn();
    }, 700);
    return;
  }

  if (deck.length === 0) reshuffleDeck();
  const drawn = deck.pop();
  updateDeckCount();

  if (drawn.special) {
    compUseSpecial(drawn);
    return;
  }

  const drawVal = drawn.value;

  if (worstIdx >= 0 && drawVal < worstVal) {
    const old = compHand[worstIdx];
    compHand[worstIdx] = drawn;
    compMemory.comp[worstIdx] = drawVal;
    discard.push(old);
  } else if (difficulty !== 'hard' && Math.random() < 0.3 && drawVal <= 3) {
    const unknowns = [0,1,2,3].filter(i => !(i in memComp));
    if (unknowns.length > 0) {
      const ri = unknowns[Math.floor(Math.random() * unknowns.length)];
      const old = compHand[ri];
      compHand[ri] = drawn;
      compMemory.comp[ri] = drawVal;
      discard.push(old);
    } else {
      discard.push(drawn);
    }
  } else {
    discard.push(drawn);
  }

  renderDiscardTop();
  renderCompCards();
  updateDeckCount();

  setTimeout(() => {
    if (turnCount >= 4 && !chatchtulCaller) {
      const knownSum = Object.values(memComp).reduce((a, b) => typeof b === 'number' ? a + b : a, 0);
      const knownCount = Object.values(memComp).filter(v => typeof v === 'number').length;
      const estimatedTotal = knownCount === 4 ? knownSum : knownSum + (4 - knownCount) * 4;

      let threshold;
      if (difficulty === 'easy') threshold = 6;
      else if (difficulty === 'medium') threshold = 10;
      else threshold = 14;

      if (estimatedTotal <= threshold && knownCount >= (difficulty === 'easy' ? 4 : 3)) {
        callChatchtulComp();
        return;
      }
    }
    finishCompTurn();
  }, 400);
}

function compUseSpecial(card) {
  const type = card.value;

  if (type === CARD_TYPES.PEEK) {
    const unknowns = [0,1,2,3].filter(i => !(i in compMemory.comp));
    if (unknowns.length > 0) {
      const idx = unknowns[Math.floor(Math.random() * unknowns.length)];
      compMemory.comp[idx] = compHand[idx].special ? 10 : compHand[idx].value;
    }
    discard.push(card);
    renderDiscardTop();
    toast(lang === 'he' ? '🤖 המחשב הציץ בקלף' : '🤖 Computer peeked');
    setTimeout(() => finishCompTurn(), 800);
  } else if (type === CARD_TYPES.SWAP) {
    let worstIdx = -1, worstVal = -1;
    for (const [idx, val] of Object.entries(compMemory.comp)) {
      if (typeof val === 'number' && val > worstVal) { worstVal = val; worstIdx = parseInt(idx); }
    }
    if (worstIdx >= 0 && worstVal >= 5) {
      const pIdx = Math.floor(Math.random() * 4);
      const temp = compHand[worstIdx];
      compHand[worstIdx] = playerHand[pIdx];
      playerHand[pIdx] = temp;
      if (!compHand[worstIdx].special) compMemory.comp[worstIdx] = compHand[worstIdx].value;
      else delete compMemory.comp[worstIdx];

      const cSlot = document.getElementById('compCards').children[worstIdx];
      const pSlot = document.getElementById('playerCards').children[pIdx];
      if (cSlot) cSlot.classList.add('swapping');
      if (pSlot) pSlot.classList.add('swapping');

      discard.push(card);
      toast(lang === 'he' ? '🤖 המחשב החליף קלף!' : '🤖 Computer swapped a card!');
      setTimeout(() => {
        renderCompCards(); renderPlayerCards(); renderDiscardTop();
        finishCompTurn();
      }, 800);
    } else {
      discard.push(card);
      renderDiscardTop();
      setTimeout(() => finishCompTurn(), 400);
    }
  } else if (type === CARD_TYPES.DRAW2) {
    discard.push(card);
    if (deck.length < 2) reshuffleDeck();
    const c1 = deck.pop(), c2 = deck.pop();
    updateDeckCount();

    const v1 = c1.special ? 10 : c1.value;
    const v2 = c2.special ? 10 : c2.value;
    const kept = v1 <= v2 ? c1 : c2;
    const discarded = v1 <= v2 ? c2 : c1;
    discard.push(discarded);

    if (!kept.special) {
      let worstIdx = -1, worstVal = -1;
      for (const [idx, val] of Object.entries(compMemory.comp)) {
        if (typeof val === 'number' && val > worstVal) { worstVal = val; worstIdx = parseInt(idx); }
      }
      if (worstIdx >= 0 && kept.value < worstVal) {
        const old = compHand[worstIdx];
        compHand[worstIdx] = kept;
        compMemory.comp[worstIdx] = kept.value;
        discard.push(old);
      } else {
        discard.push(kept);
      }
    } else {
      discard.push(kept);
    }

    renderDiscardTop(); renderCompCards(); updateDeckCount();
    toast(lang === 'he' ? '🤖 המחשב שלף 2' : '🤖 Computer drew 2');
    setTimeout(() => finishCompTurn(), 600);
  }
}

function finishCompTurn() {
  if (chatchtulCaller && lastTurnFor === 'computer') {
    setTimeout(() => revealAll(), 500);
    return;
  }
  if (chatchtulCaller && lastTurnFor === 'player') {
    startPlayerTurn();
    return;
  }
  startPlayerTurn();
}

// --- Chatchtul! (with shockwave effect) ---
function callChatchtul() {
  if (phase !== 'playerTurn' || chatchtulCaller) return;
  chatchtulCaller = 'player';
  lastTurnFor = 'computer';

  // Visual shockwave
  const sw = document.createElement('div');
  sw.className = 'shockwave';
  document.body.appendChild(sw);
  setTimeout(() => sw.remove(), 900);

  const fl = document.createElement('div');
  fl.className = 'screen-flash';
  document.body.appendChild(fl);
  setTimeout(() => fl.remove(), 600);

  toast(t('chatchtulCalled'), 2500);
  enableChatchtul(false);
  setStatus('chatchtulCalled');

  setTimeout(() => {
    startCompTurn();
  }, 1500);
}

function callChatchtulComp() {
  chatchtulCaller = 'computer';
  lastTurnFor = 'player';

  // Shockwave for computer call too
  const sw = document.createElement('div');
  sw.className = 'shockwave';
  document.body.appendChild(sw);
  setTimeout(() => sw.remove(), 900);

  toast(t('compCalledChatchtul'), 2500);
  setStatus('compCalledChatchtul');
  setTimeout(() => {
    startPlayerTurn();
  }, 1500);
}

// --- Reveal & Score ---
function revealAll() {
  phase = 'over';
  enablePiles(false);
  enableChatchtul(false);
  document.getElementById('compTurn').style.display = 'none';
  document.getElementById('playerTurn').style.display = 'none';

  // Flip all cards with staggered animation
  let delay = 0;
  for (let i = 0; i < 4; i++) {
    setTimeout(() => flipCardPermanent('player', i), delay);
    setTimeout(() => flipCardPermanent('computer', i), delay + 200);
    delay += 400;
  }

  setTimeout(() => showScoreScreen(), delay + 600);
}

function calcScore(hand) {
  return hand.reduce((sum, c) => sum + (c.special ? 0 : c.value), 0);
}

function showScoreScreen() {
  let pScore = calcScore(playerHand);
  let cScore = calcScore(compHand);
  let bonusText = '';

  if (chatchtulCaller === 'player') {
    if (pScore <= cScore) {
      pScore -= 5;
      bonusText = t('callerBonus');
    } else {
      pScore += 10;
      bonusText = t('callerPenalty');
    }
  } else if (chatchtulCaller === 'computer') {
    if (cScore <= pScore) {
      cScore -= 5;
    } else {
      cScore += 10;
    }
  }

  const won = pScore < cScore;
  const tied = pScore === cScore;

  if (won) { record.w++; }
  else if (!tied) { record.l++; }
  localStorage.setItem('chatchtul-record', JSON.stringify(record));
  updateRecordUI();

  // Confetti if player wins
  if (won) setTimeout(() => spawnConfetti(), 300);

  const panel = document.getElementById('scorePanel');
  panel.innerHTML = `
    <div class="result-emoji">${won ? '🎉' : tied ? '🤝' : '😿'}</div>
    <div class="score-title">${won ? t('youWin') : tied ? t('tie') : t('youLose')}</div>
    ${!won && !tied ? `<p style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin:4px 0">${lang === 'he' ? 'בפעם הבאה!' : 'Next time!'}</p>` : ''}
    ${bonusText ? `<div style="font-size:0.8rem;color:#ffd93d;font-weight:700;margin:4px 0">${chatchtulCaller === 'player' ? t(pScore < cScore + 5 ? 'bonus' : 'penalty') : ''} ${bonusText}</div>` : ''}

    <div class="score-row" style="margin-top:12px">
      <div class="score-row-label">${t('yourScore')}</div>
      <div class="score-cards-reveal">
        ${playerHand.map(c => `<div class="score-card-mini ${cardColorClass(c)}"><span class="card-emoji">${cardEmoji(c)}</span><span class="card-value">${c.special ? '0' : c.value}</span></div>`).join('')}
      </div>
      <div class="score-total" style="color:${pScore <= cScore ? '#4ade80' : '#f87171'}">${pScore}</div>
    </div>

    <div class="score-row">
      <div class="score-row-label">${t('compScore')}</div>
      <div class="score-cards-reveal">
        ${compHand.map(c => `<div class="score-card-mini ${cardColorClass(c)}"><span class="card-emoji">${cardEmoji(c)}</span><span class="card-value">${c.special ? '0' : c.value}</span></div>`).join('')}
      </div>
      <div class="score-total" style="color:${cScore <= pScore ? '#4ade80' : '#f87171'}">${cScore}</div>
    </div>

    <div class="stats-card">
      <div class="stat">
        <div class="stat-num" style="color:#4ade80">${record.w}</div>
        <div class="stat-label">${t('wins')}</div>
      </div>
      <div class="stat">
        <div class="stat-num" style="color:#f87171">${record.l}</div>
        <div class="stat-label">${t('losses')}</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
      <button class="action-btn green" onclick="document.getElementById('scoreOverlay').classList.remove('show');startGame()" style="min-height:48px">${t('playAgain')}</button>
      <button class="action-btn secondary" onclick="document.getElementById('scoreOverlay').classList.remove('show');showScreen('menuScreen')" style="min-height:48px">${t('backToMenu')}</button>
    </div>
  `;

  document.getElementById('scoreOverlay').classList.add('show');
}

// --- Reshuffle ---
function reshuffleDeck() {
  if (discard.length <= 1) return;
  const top = discard.pop();
  deck = shuffle([...discard]);
  discard = [top];
  updateDeckCount();
  renderDiscardTop();
  toast(lang === 'he' ? '🔀 החפיסה עורבבה מחדש' : '🔀 Deck reshuffled');
}
</script>
</body>
