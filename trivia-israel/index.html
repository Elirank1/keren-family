<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>טריוויה ישראלית 🇮🇱</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root {
  --clr-bg: #0a0a1a;
  --clr-surface: rgba(255,255,255,0.06);
  --clr-surface-strong: rgba(255,255,255,0.1);
  --clr-border: rgba(255,255,255,0.1);
  --clr-border-strong: rgba(255,255,255,0.18);
  --clr-gold: #FFD93D;
  --clr-green: #6BCB77;
  --clr-red: #FF6B6B;
  --clr-purple: #845EC2;
  --clr-purple-light: #c4b5fd;
  --glass-blur: 24px;
  --cat-cities: #3b82f6;
  --cat-food: #f59e0b;
  --cat-landmarks: #22c55e;
  --cat-people: #a855f7;
  --cat-slang: #ec4899;
  --cat-nature: #14b8a6;
}

body{font-family:'Nunito',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;user-select:none;-webkit-user-select:none;color:#fff;background:var(--clr-bg)}
h1,h2,h3,.font-display{font-family:'Fredoka One',cursive}

/* ============ BACKGROUND ============ */
.bg-main{
  background:linear-gradient(160deg,#0a0a1a 0%,#111133 25%,#0a0a1a 50%,#0d1a2e 75%,#0a0a1a 100%);
  position:relative;min-height:100vh;min-height:100dvh;overflow:hidden;
}
.bg-main::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:
    radial-gradient(circle at 25% 40%,rgba(59,130,246,0.06) 0%,transparent 50%),
    radial-gradient(circle at 75% 30%,rgba(236,72,153,0.05) 0%,transparent 50%),
    radial-gradient(circle at 50% 80%,rgba(255,217,61,0.04) 0%,transparent 50%),
    radial-gradient(circle at 60% 60%,rgba(34,197,94,0.04) 0%,transparent 40%);
  animation:bgRotate 40s linear infinite;pointer-events:none;
}
@keyframes bgRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.bg-main::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(132,94,194,0.08) 0%,transparent 60%);
  pointer-events:none;z-index:0;
  animation:overlayPulse 8s ease-in-out infinite alternate;
}
@keyframes overlayPulse{0%{opacity:0.5;transform:scale(1)}100%{opacity:1;transform:scale(1.1)}}

/* ============ PARTICLES ============ */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;pointer-events:none;animation:particleFloat linear infinite;opacity:0}
@keyframes particleFloat{
  0%{transform:translateY(105vh) rotate(0deg) scale(0.8);opacity:0}
  5%{opacity:0.09}50%{opacity:0.12}95%{opacity:0.06}
  100%{transform:translateY(-10vh) rotate(360deg) scale(1.2);opacity:0}
}

/* ============ GLASS SYSTEM (UI panels only) ============ */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--clr-border);
  box-shadow:0 4px 30px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
}
.glass-strong{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid var(--clr-border-strong);
  box-shadow:0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
}

/* ============ LAYOUT ============ */
.container{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}

/* ============ TOP BAR ============ */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px}
.back-btn,.lang-btn{
  width:48px;height:48px;border-radius:50%;border:none;
  font-size:1.2rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  color:#fff;display:flex;align-items:center;justify-content:center;
  text-decoration:none;
}
.back-btn:hover,.lang-btn:hover{transform:scale(1.1);border-color:rgba(255,255,255,0.25)}
.back-btn:active,.lang-btn:active{transform:scale(0.92)}
.lang-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.75rem}

/* ============ TITLE ============ */
.title-gradient{
  background:linear-gradient(135deg,#fff 0%,#c4b5fd 30%,#fbbf24 60%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% 200%;animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ============ SCREENS ============ */
.screen{display:none;animation:screenIn 0.5s cubic-bezier(0.16,1,0.3,1)}
.screen.active{display:block}
@keyframes screenIn{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ============ START SCREEN ============ */
.hero{text-align:center;padding:2rem 0}
.hero-emoji{font-size:5rem;margin-bottom:16px;display:inline-block;animation:emojiFloat 3s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(255,217,61,0.2))}
@keyframes emojiFloat{
  0%{transform:translateY(0) rotate(0deg) scale(1)}
  25%{transform:translateY(-8px) rotate(4deg) scale(1.05)}
  50%{transform:translateY(0) rotate(0deg) scale(1)}
  75%{transform:translateY(-5px) rotate(-4deg) scale(1.03)}
  100%{transform:translateY(0) rotate(0deg) scale(1)}
}
.hero h1{font-size:2.8rem;line-height:1.1;margin-bottom:8px;letter-spacing:-0.02em}
.hero p{color:rgba(255,255,255,0.45);font-weight:700;font-size:1.05rem}
.high-score-box{
  margin:20px auto;padding:14px 24px;border-radius:24px;
  display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;
}
.high-score-box span{color:var(--clr-gold)}
.start-btn{
  display:block;width:100%;max-width:340px;margin:28px auto 0;padding:20px 36px;
  border:none;border-radius:28px;font-family:'Fredoka One',cursive;font-size:1.5rem;
  color:#fff;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  background:linear-gradient(135deg,#845EC2 0%,#FF6B6B 50%,#fbbf24 100%);
  background-size:200% 200%;animation:btnGradient 3s ease infinite;
  box-shadow:0 8px 40px rgba(132,94,194,0.4),0 0 60px rgba(132,94,194,0.15);
  min-height:60px;position:relative;overflow:hidden;
}
.start-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.15) 50%,transparent 60%);
  animation:btnShine 3s ease-in-out infinite;
}
@keyframes btnGradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes btnShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.start-btn:hover{transform:scale(1.03);box-shadow:0 12px 50px rgba(132,94,194,0.5)}
.start-btn:active{transform:scale(0.97)}
.rules-card{margin:28px auto 0;max-width:420px;padding:24px 28px;border-radius:24px;text-align:right}
.rules-card h3{font-size:1.15rem;margin-bottom:12px;color:var(--clr-purple-light)}
.rules-card ul{list-style:none;font-size:0.92rem;font-weight:600;color:rgba(255,255,255,0.55);line-height:2}
.rules-card ul li::before{content:'🔹';margin-left:6px}

/* ============ PROGRESS DOTS — larger, more spaced ============ */
.progress-dots{
  display:flex;justify-content:center;gap:12px;margin-bottom:16px;
}
.progress-dot{
  width:14px;height:14px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.08);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.progress-dot.completed{background:var(--clr-green);border-color:var(--clr-green);box-shadow:0 0 10px rgba(107,203,119,0.5)}
.progress-dot.current{
  background:var(--clr-gold);border-color:var(--clr-gold);
  box-shadow:0 0 14px rgba(255,217,61,0.6),0 0 28px rgba(255,217,61,0.25);
  transform:scale(1.4);
  animation:dotPulse 1.5s ease-in-out infinite;
}
.progress-dot.wrong-dot{background:var(--clr-red);border-color:var(--clr-red);box-shadow:0 0 10px rgba(255,107,107,0.5)}
@keyframes dotPulse{0%,100%{box-shadow:0 0 14px rgba(255,217,61,0.6)}50%{box-shadow:0 0 22px rgba(255,217,61,0.9)}}

/* ============ GAME HUD ============ */
.hud{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;border-radius:24px;margin-bottom:12px;flex-wrap:wrap;gap:8px;
}
.hud-item{text-align:center;min-width:65px}
.hud-label{font-size:0.7rem;color:rgba(255,255,255,0.35);font-weight:800;text-transform:uppercase;letter-spacing:0.05em}
.hud-value{font-family:'Fredoka One',cursive;font-size:1.35rem}
.hud-value.score{color:var(--clr-gold)}
.hud-value.round{color:var(--clr-purple-light)}

/* ============ SVG CIRCULAR TIMER — LARGER 120px ============ */
.timer-ring-container{
  display:flex;justify-content:center;align-items:center;
  position:relative;
}
.timer-ring-svg{width:120px;height:120px;transform:rotate(-90deg);filter:drop-shadow(0 0 12px rgba(107,203,119,0.3))}
.timer-ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4}
.timer-ring-progress{
  fill:none;stroke:var(--clr-green);stroke-width:4.5;
  stroke-linecap:round;
  transition:stroke-dashoffset 0.15s linear, stroke 0.5s ease;
}
.timer-ring-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;font-size:2rem;color:var(--clr-green);
  transition:color 0.5s ease;
}
.timer-ring-container.warning .timer-ring-progress{stroke:var(--clr-gold)}
.timer-ring-container.warning .timer-ring-text{color:var(--clr-gold)}
.timer-ring-container.danger .timer-ring-progress{stroke:var(--clr-red)}
.timer-ring-container.danger .timer-ring-text{color:var(--clr-red)}
.timer-ring-container.danger.pulse-timer .timer-ring-text{
  animation:timerPulse 0.5s ease-in-out infinite;
}
@keyframes timerPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}

/* ============ CATEGORY BANNER — full width across clue area ============ */
.category-banner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:12px 24px;border-radius:20px;font-family:'Fredoka One',cursive;font-weight:800;font-size:1rem;
  margin-bottom:14px;transition:all 0.4s ease;width:100%;
  letter-spacing:0.02em;
}
.category-banner.cat-cities{background:linear-gradient(135deg,rgba(59,130,246,0.25),rgba(59,130,246,0.1));border:1px solid rgba(59,130,246,0.35);color:#93c5fd}
.category-banner.cat-food{background:linear-gradient(135deg,rgba(245,158,11,0.25),rgba(245,158,11,0.1));border:1px solid rgba(245,158,11,0.35);color:#fcd34d}
.category-banner.cat-landmarks{background:linear-gradient(135deg,rgba(34,197,94,0.25),rgba(34,197,94,0.1));border:1px solid rgba(34,197,94,0.35);color:#86efac}
.category-banner.cat-people{background:linear-gradient(135deg,rgba(168,85,247,0.25),rgba(168,85,247,0.1));border:1px solid rgba(168,85,247,0.35);color:#d8b4fe}
.category-banner.cat-slang{background:linear-gradient(135deg,rgba(236,72,153,0.25),rgba(236,72,153,0.1));border:1px solid rgba(236,72,153,0.35);color:#f9a8d4}
.category-banner.cat-nature{background:linear-gradient(135deg,rgba(20,184,166,0.25),rgba(20,184,166,0.1));border:1px solid rgba(20,184,166,0.35);color:#5eead4}

/* ============ CLUE CARDS — bigger, full width, with number badges ============ */
.clue-area{min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:12px;gap:10px;width:100%}
.clue-card{
  width:100%;padding:16px 20px 16px 20px;border-radius:20px;
  font-weight:700;font-size:1.1rem;line-height:1.5;
  transform-origin:center;position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
  display:flex;align-items:center;gap:14px;
}
.clue-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 50%);
  pointer-events:none;
}
.clue-card.slide-in-right{animation:slideInRight 0.6s cubic-bezier(0.16,1,0.3,1)}
.clue-card.slide-in-left{animation:slideInLeft 0.6s cubic-bezier(0.16,1,0.3,1)}
.clue-card.flip-in{animation:clueFlip 0.6s cubic-bezier(0.16,1,0.3,1)}
.clue-card.fade-up{animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1)}

@keyframes slideInRight{0%{transform:translateX(100%) scale(0.9);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}
@keyframes slideInLeft{0%{transform:translateX(-100%) scale(0.9);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}
@keyframes clueFlip{0%{transform:perspective(800px) rotateY(-90deg);opacity:0}100%{transform:perspective(800px) rotateY(0deg);opacity:1}}
@keyframes fadeUp{0%{transform:translateY(30px) scale(0.95);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}

/* Number badge */
.clue-badge{
  flex-shrink:0;width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1.3rem;font-weight:900;
  background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.8);
}
.clue-text{font-size:1.15rem;font-weight:800;letter-spacing:0.01em;flex:1}

/* Clue card color per index */
.clue-card.clue-1{background:rgba(132,94,194,0.15);border:1px solid rgba(132,94,194,0.25)}
.clue-card.clue-1 .clue-badge{background:rgba(132,94,194,0.3);border-color:rgba(132,94,194,0.5);color:#d8b4fe}
.clue-card.clue-2{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.2)}
.clue-card.clue-2 .clue-badge{background:rgba(255,107,107,0.25);border-color:rgba(255,107,107,0.4);color:#fca5a5}
.clue-card.clue-3{background:rgba(255,217,61,0.1);border:1px solid rgba(255,217,61,0.18)}
.clue-card.clue-3 .clue-badge{background:rgba(255,217,61,0.2);border-color:rgba(255,217,61,0.35);color:#fde68a}
.clue-card.clue-4{background:rgba(107,203,119,0.1);border:1px solid rgba(107,203,119,0.18)}
.clue-card.clue-4 .clue-badge{background:rgba(107,203,119,0.2);border-color:rgba(107,203,119,0.35);color:#86efac}

/* ============ NEXT CLUE BUTTON ============ */
.next-clue-btn{
  padding:12px 28px;border:none;border-radius:20px;font-weight:800;font-size:0.9rem;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  color:#fff;background:rgba(132,94,194,0.25);border:1px solid rgba(132,94,194,0.35);
  margin-top:8px;min-height:48px;position:relative;overflow:hidden;
}
.next-clue-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.08) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform 0.5s;
}
.next-clue-btn:hover::before{transform:translateX(100%)}
.next-clue-btn:hover{transform:scale(1.05);border-color:rgba(132,94,194,0.6)}
.next-clue-btn:active{transform:scale(0.95)}
.next-clue-btn:disabled{opacity:0.3;cursor:default;transform:none!important}

/* ============ ANSWER BUTTONS — FULL WIDTH with A/B/C/D labels ============ */
.answers{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.answer-btn{
  padding:16px 18px;border:2px solid rgba(255,255,255,0.1);border-radius:20px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  font-weight:800;font-size:1.05rem;color:#fff;cursor:pointer;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  text-align:right;min-height:64px;line-height:1.3;word-break:break-word;
  position:relative;overflow:hidden;width:100%;
  box-shadow:0 4px 20px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:14px;
}
.answer-label{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:0.95rem;
  background:rgba(132,94,194,0.2);border:2px solid rgba(132,94,194,0.35);
  color:var(--clr-purple-light);
}
.answer-text{flex:1}
.answer-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,rgba(255,255,255,0.06) 0%,transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.answer-btn:hover{
  transform:translateY(-2px) scale(1.01);
  border-color:rgba(255,255,255,0.25);
  box-shadow:0 8px 32px rgba(0,0,0,0.2),0 0 30px rgba(132,94,194,0.15),inset 0 1px 0 rgba(255,255,255,0.1);
}
.answer-btn:hover::before{opacity:1}
.answer-btn:active{transform:scale(0.97)}

.answer-btn.correct{
  background:rgba(107,203,119,0.25);border-color:#6BCB77;
  box-shadow:0 0 40px rgba(107,203,119,0.3),0 4px 20px rgba(107,203,119,0.2);
  animation:correctPulse 0.6s ease;
}
.answer-btn.correct .answer-label{background:rgba(107,203,119,0.4);border-color:#6BCB77;color:#fff}
.answer-btn.correct::after{content:'✅';position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:1.2rem}
.answer-btn.wrong{
  background:rgba(255,107,107,0.2);border-color:#FF6B6B;
  animation:shakeWrong 0.5s ease;
}
.answer-btn.wrong .answer-label{background:rgba(255,107,107,0.4);border-color:#FF6B6B;color:#fff}
.answer-btn.wrong::after{content:'❌';position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:1.2rem}
.answer-btn.reveal{
  border-color:rgba(107,203,119,0.6);background:rgba(107,203,119,0.15);
  box-shadow:0 0 20px rgba(107,203,119,0.2);
}
.answer-btn:disabled{cursor:default;transform:none!important}

@keyframes correctPulse{
  0%{transform:scale(1)}30%{transform:scale(1.04);box-shadow:0 0 50px rgba(107,203,119,0.4)}60%{transform:scale(0.98)}100%{transform:scale(1)}
}
@keyframes shakeWrong{
  0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}
}

/* ============ ROUND TRANSITION OVERLAY ============ */
.round-transition{
  position:fixed;inset:0;z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,26,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.round-transition.show{opacity:1;pointer-events:auto}
.round-transition .round-num{
  font-family:'Fredoka One',cursive;font-size:clamp(3rem,12vw,5rem);
  background:linear-gradient(135deg,#c4b5fd,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:roundZoomIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
}
.round-transition .round-label{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;color:rgba(255,255,255,0.4);margin-top:4px;
}
@keyframes roundZoomIn{0%{transform:scale(3);opacity:0;filter:blur(10px)}50%{transform:scale(0.9);opacity:1;filter:blur(0)}100%{transform:scale(1)}}

/* ============ EXCITEMENT MESSAGES ============ */
.excitement-msg{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-family:'Fredoka One',cursive;font-size:2rem;
  text-shadow:0 4px 30px rgba(255,217,61,0.5),0 0 60px rgba(255,217,61,0.2);

}

@keyframes pointsPop{
  0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}
  15%{transform:translate(-50%,-50%) scale(1.4) rotate(3deg);opacity:1}
  30%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}

/* ============ RESULTS SCREEN ============ */

.results-stars{font-size:3rem;margin:16px 0}

.results-msg{font-size:1.2rem;font-weight:800;color:var(--clr-purple-light);margin-bottom:12px}
.new-record{

.category-breakdown{margin:20px 0;display:flex;flex-direction:column;gap:8px}
.cat-row{

}

.results-details{margin:16px 0;text-align:right}

.confetti-piece{position:fixed;width:10px;height:10px;top:-20px;z-index:300;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{

}

function toggleLang() {
  lang = lang === 'he' ? 'en' : 'he';
  document.documentElement.lang = lang === 'he' ? 'he' : 'en';
  document.documentElement.dir = lang === 'he' ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = lang === 'he' ? 'EN' : 'עב';
  document.querySelectorAll('[data-he]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  updateRulesLang();
}

function openRulesModal() {

function updateRulesLang() {
  const isHe = lang === 'he';
  document.getElementById('rulesModalTitle').textContent = isHe ? 'הוראות משחק' : 'Game Rules';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function initParticles() {
  const container = document.getElementById('particles');
  const emojis = ['🇮🇱','✡️','🕎','🫒','🌴','🐫','✡️','🕎','🫒','🌴','☀️','💎','📜','🌸'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[i % emojis.length];
    p.style.fontSize = (16 + Math.random() * 20) + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (15 + Math.random() * 25) + 's';
    p.style.animationDelay = Math.random() * 20 + 's';
    container.appendChild(p);
  }
}

function updateHighScoreDisplay() {
  const box = document.getElementById('highScoreBox');
  if (highScore > 0) {
    box.style.display = 'inline-flex';
    document.getElementById('highScoreVal').textContent = highScore;
  } else {
    box.style.display = 'none';
  }
}

function initProgressDots() {
  const container = document.getElementById('progressDots');
  container.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.id = `dot-${i}`;
    container.appendChild(dot);
  }
}

function updateProgressDots() {
  for (let i = 0; i < 10; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.className = 'progress-dot';
    if (i < currentRound) {
      const result = roundResults[i];
      dot.classList.add(result && result.correct ? 'completed' : 'wrong-dot');
    } else if (i === currentRound) {
      dot.classList.add('current');
    }
  }
}

// Round transition screen
function showRoundTransition(cb) {
  const overlay = document.getElementById('roundTransition');
  const numEl = document.getElementById('roundTransNum');
  const labelEl = document.getElementById('roundTransLabel');
  numEl.textContent = `${currentRound + 1}`;
  labelEl.textContent = lang === 'he' ? `סיבוב ${currentRound + 1} מתוך 10` : `Round ${currentRound + 1} of 10`;
  numEl.style.animation = 'none';
  void numEl.offsetWidth;
  numEl.style.animation = '';
  overlay.classList.add('show');
  setTimeout(() => {
    overlay.classList.remove('show');
    cb();
  }, 1500);
}

function startGame() {
  score = 0;
  currentRound = 0;
  roundResults = [];
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  gameQuestions = shuffled.slice(0, 10);
  showScreen('gameScreen');
  initProgressDots();
  showRoundTransition(() => startRound());
}

function startRound() {
  if (currentRound >= 10) {
    endGame();
    return;
  }
  const q = gameQuestions[currentRound];
  answered = false;
  cluesShown = 0;
  timeLeft = 25;

  document.getElementById('hudRound').textContent = `${currentRound + 1}/10`;
  document.getElementById('hudScore').textContent = score;

  updateTimerRing(25);

  // Category banner
  const cat = CATEGORIES[q.category];
  const badge = document.getElementById('categoryBadge');
  badge.className = 'category-banner ' + cat.cssClass;
  badge.textContent = `${cat.emoji} ${cat[lang]}`;

  document.getElementById('clueArea').innerHTML = '';

  const ncBtn = document.getElementById('nextClueBtn');
  ncBtn.disabled = false;
  ncBtn.style.display = 'block';

  // Answers with A/B/C/D labels
  const answersArea = document.getElementById('answersArea');
  answersArea.innerHTML = '';
  const opts = q.options[lang];
  const correctAnswer = q.answer[lang];
  opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-label">${ANSWER_LABELS[idx]}</span><span class="answer-text">${opt}</span>`;
    btn.onclick = () => handleAnswer(btn, opt === correctAnswer, q);
    answersArea.appendChild(btn);
  });

  updateProgressDots();
  showNextClue();

  clearInterval(clueInterval);
  clueInterval = setInterval(() => {
    if (!answered && cluesShown < 4) {
      showNextClue();
    } else {
      clearInterval(clueInterval);
    }
  }, 5000);

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (answered) return;
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      clearInterval(timerInterval);
      clearInterval(clueInterval);
      handleTimeout(q);
    }
    updateTimerDisplay();
  }, 100);
}

function showNextClue() {
  if (answered || cluesShown >= 4) return;
  const q = gameQuestions[currentRound];
  const clueArea = document.getElementById('clueArea');
  const clueText = q.clues[lang][cluesShown];

  const card = document.createElement('div');
  const animClass = CLUE_ANIMATIONS[cluesShown % CLUE_ANIMATIONS.length];
  card.className = `clue-card clue-${cluesShown + 1} ${animClass}`;
  const badgeNums = ['1️⃣','2️⃣','3️⃣','4️⃣'];
  card.innerHTML = `<div class="clue-badge">${badgeNums[cluesShown]}</div><div class="clue-text">${clueText}</div>`;
  clueArea.appendChild(card);

  cluesShown++;

  const ncBtn = document.getElementById('nextClueBtn');
  if (cluesShown >= 4) {
    ncBtn.disabled = true;
    ncBtn.style.display = 'none';
  }
}

function updateTimerRing(time) {
  const pct = (time / 25) * 100;
  const progress = document.getElementById('timerRingProgress');
  const textEl = document.getElementById('timerRingText');
  const container = document.getElementById('timerRingContainer');

  progress.style.strokeDashoffset = (100 - pct);
  textEl.textContent = Math.max(0, Math.ceil(time));

  container.classList.remove('warning', 'danger', 'pulse-timer');
  if (time <= 5) {
    container.classList.add('danger', 'pulse-timer');
  } else if (time <= 12) {
    container.classList.add('warning');
  }
}

function updateTimerDisplay() {
  updateTimerRing(timeLeft);
}

function handleAnswer(btn, isCorrect, q) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  clearInterval(clueInterval);

  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => b.disabled = true);

  if (isCorrect) {
    btn.classList.add('correct');
    const pts = getPoints();
    score += pts;
    document.getElementById('hudScore').textContent = score;
    showPointsPopup(`+${pts}`);
    spawnConfetti();
    roundResults.push({ q, correct: true, pts, clues: cluesShown });

    // Excitement message for quick answers
    const exciteMap = lang === 'he' ? EXCITEMENT_HE : EXCITEMENT_EN;
    if (exciteMap[cluesShown]) {
      showExcitement(exciteMap[cluesShown]);
    }
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      if (b.querySelector('.answer-text') && b.querySelector('.answer-text').textContent === q.answer[lang]) b.classList.add('reveal');
    });
    roundResults.push({ q, correct: false, pts: 0, clues: cluesShown });
  }

  while (cluesShown < 4) {
    showNextClue();
  }
  document.getElementById('nextClueBtn').style.display = 'none';

  setTimeout(() => {
    currentRound++;
    if (currentRound < 10) {
      showRoundTransition(() => startRound());
    } else {
      startRound(); // will call endGame
    }
  }, 2000);
}

function handleTimeout(q) {
  answered = true;
  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.querySelector('.answer-text') && b.querySelector('.answer-text').textContent === q.answer[lang]) b.classList.add('reveal');
  });
  roundResults.push({ q, correct: false, pts: 0, clues: cluesShown });

  while (cluesShown < 4) showNextClue();
  document.getElementById('nextClueBtn').style.display = 'none';

  showPointsPopup(lang === 'he' ? '⏰ נגמר הזמן!' : '⏰ Time Up!');

  setTimeout(() => {
    currentRound++;
    if (currentRound < 10) {
      showRoundTransition(() => startRound());
    } else {
      startRound();
    }
  }, 2200);
}

function getPoints() {
  if (cluesShown <= 1) return 40;
  if (cluesShown === 2) return 30;
  if (cluesShown === 3) return 20;
  return 10;
}

function showPointsPopup(text) {
  const el = document.getElementById('pointsPopup');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function showExcitement(text) {
  const el = document.getElementById('excitementMsg');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function spawnConfetti() {
  const colors = ['#FFD93D','#FF6B6B','#6BCB77','#845EC2','#00C9A7','#FFC75F','#FF9671','#3b82f6','#ec4899'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : Math.random() > 0.5 ? '2px' : '0';
    c.style.width = (6 + Math.random() * 10) + 'px';
    c.style.height = (6 + Math.random() * 10) + 'px';
    c.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    c.style.animationDelay = Math.random() * 0.6 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4500);
  }
}

function endGame() {
  clearInterval(timerInterval);
  clearInterval(clueInterval);
  showScreen('resultsScreen');

  const finalScoreEl = document.getElementById('finalScore');
  animateCounter(finalScoreEl, 0, score, 1200);

  const starCount = score >= 350 ? 3 : score >= 200 ? 2 : score >= 100 ? 1 : 0;
  const starsEl = document.getElementById('resultStars');
  starsEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const span = document.createElement('span');
    span.className = 'star' + (i < starCount ? ' earned' : '');
    span.textContent = i < starCount ? '⭐' : '☆';
    if (i < starCount) {
      span.style.animationDelay = (i * 0.2) + 's';
    }
    starsEl.appendChild(span);
  }

  const msgEl = document.getElementById('resultMsg');
  if (lang === 'he') {
    if (score >= 350) msgEl.textContent = '🔥 ישראלי אמיתי!';
    else if (score >= 250) msgEl.textContent = '👏 מרשים מאוד!';
    else if (score >= 150) msgEl.textContent = '😊 לא רע בכלל!';
    else if (score >= 50) msgEl.textContent = '🤔 אפשר יותר טוב...';
    else msgEl.textContent = '📚 כדאי ללמוד עוד על ישראל!';
  } else {
    if (score >= 350) msgEl.textContent = '🔥 True Israeli!';
    else if (score >= 250) msgEl.textContent = '👏 Very impressive!';
    else if (score >= 150) msgEl.textContent = '😊 Not bad at all!';
    else if (score >= 50) msgEl.textContent = '🤔 Could be better...';
    else msgEl.textContent = '📚 Time to learn about Israel!';
  }

  const recordEl = document.getElementById('newRecord');
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('trivia-israel-highscore', highScore);
    recordEl.style.display = 'block';
    spawnConfetti();
    setTimeout(spawnConfetti, 600);
    setTimeout(spawnConfetti, 1200);
  } else {
    recordEl.style.display = 'none';
  }

  buildCategoryBreakdown();

  const details = document.getElementById('resultsDetails');
  details.innerHTML = '';
  roundResults.forEach((r, i) => {
    const row = document.createElement('div');
    row.className = 'results-row ' + (r.correct ? 'correct-row' : 'wrong-row');
    const cat = CATEGORIES[r.q.category];
    const label = `${r.correct ? '✅' : '❌'} ${cat.emoji} ${r.q.answer[lang]}`;
    const pts = r.correct ? `+${r.pts}` : '0';
    row.innerHTML = `<span>${label}</span><span class="pts">${pts}</span>`;
    row.style.animation = 'screenIn 0.4s cubic-bezier(0.16,1,0.3,1) backwards';
    row.style.animationDelay = (i * 0.06) + 's';
    details.appendChild(row);
  });

  updateHighScoreDisplay();
}

function buildCategoryBreakdown() {
  const breakdown = document.getElementById('categoryBreakdown');
  breakdown.innerHTML = '';
  const catScores = {};
  const catMax = {};
  roundResults.forEach(r => {
    const cat = r.q.category;
    if (!catScores[cat]) { catScores[cat] = 0; catMax[cat] = 0; }
    catScores[cat] += r.pts;
    catMax[cat] += 40;
  });
  Object.keys(catScores).forEach(cat => {
    const info = CATEGORIES[cat];
    const pct = catMax[cat] > 0 ? (catScores[cat] / catMax[cat]) * 100 : 0;
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <span class="cat-row-emoji">${info.emoji}</span>
      <span class="cat-row-name">${info[lang]}</span>
      <div class="cat-row-bar"><div class="cat-row-fill" style="width:0%;background:${info.color}"></div></div>
      <span class="cat-row-score">${catScores[cat]}</span>
    `;
    breakdown.appendChild(row);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        row.querySelector('.cat-row-fill').style.width = pct + '%';
      });
    });
  });
}

function animateCounter(el, start, end, duration) {
  const startTime = performance.now();
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (end - start) * eased);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

document.addEventListener('DOMContentLoaded', () => {
  initParticles();
  updateHighScoreDisplay();
});
</script>
</body>
</html>
