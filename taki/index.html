<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a2e1a">
<title>Taki | Keren Family</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #DC2626; --blue: #2563EB; --green: #16A34A; --yellow: #CA8A04;
  --red-dark: #991B1B; --blue-dark: #1E40AF; --green-dark: #15803D; --yellow-dark: #92400E;
  --red-glow: rgba(220,38,38,0.5); --blue-glow: rgba(37,99,235,0.5); --green-glow: rgba(22,163,74,0.5); --yellow-glow: rgba(202,138,4,0.5);
  --card-w: 70px; --card-h: 100px; --card-r: 14px;
  --pile-w: 90px; --pile-h: 130px; --pile-r: 16px;
  --felt: #0a2e1a; --felt-dark: #051a0e;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Nunito',sans-serif; min-height:100vh; min-height:100dvh; overflow:hidden;
  user-select:none; -webkit-user-select:none;
  background: linear-gradient(160deg, #0d3320 0%, var(--felt) 30%, var(--felt-dark) 70%, #041208 100%);
  color:#fff; position:relative;
}
h1,h2,h3,.font-display { font-family:'Fredoka One',cursive; }

/* Felt texture overlay */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: repeating-conic-gradient(rgba(255,255,255,0.008) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px;
  mix-blend-mode: overlay;
}
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 80% 50% at 50% 40%, rgba(22,163,74,0.08), transparent);
}

/* ── Top bar ── */
.top-bar { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:10px 16px; }
.top-bar-circle {
  width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.35); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1); color:#fff; font-size:1rem; cursor:pointer;
  text-decoration:none; transition:all 0.25s; flex-shrink:0;
}
.top-bar-circle:hover { background:rgba(0,0,0,0.5); transform:scale(1.08); }
.top-bar-circle:active { transform:scale(0.94); }

/* ── Status panel (glass pill, top center) ── */
.status-panel {
  position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:200;
  display:flex; align-items:center; gap:10px; padding:7px 18px; border-radius:22px;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08); white-space:nowrap;
}
.status-turn { font-family:'Fredoka One',cursive; font-size:0.8rem; }
.status-badge {
  font-size:0.6rem; font-weight:800; padding:3px 9px; border-radius:10px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.06);
  animation:badgePop 0.3s ease-out;
}
@keyframes badgePop { 0% { transform:scale(0.5); opacity:0; } 100% { transform:scale(1); opacity:1; } }
.status-badge.taki-badge { background:rgba(202,138,4,0.25); border-color:rgba(202,138,4,0.3); color:#fbbf24; }
.status-badge.plus-badge { background:rgba(220,38,38,0.25); border-color:rgba(220,38,38,0.3); color:#fca5a5; }

/* ── Game area ── */
.game-area { position:fixed; inset:0; display:flex; flex-direction:column; padding-top:54px; z-index:1; }

/* ── Opponent zone ── */
.opponent-zone { flex:0 0 auto; padding:6px 16px 4px; display:flex; align-items:center; gap:10px; min-height:76px; }
.opp-info { text-align:center; min-width:44px; }
.opp-label { font-size:0.6rem; font-weight:800; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:1px; }
.opp-count { font-size:1.6rem; font-weight:900; font-family:'Fredoka One',cursive; color:#86efac; }
.opp-cards { display:flex; flex:1; justify-content:center; align-items:center; min-height:55px; position:relative; }

/* ── CARD BACK (opponent cards + draw deck) ── */
.card-back {
  border-radius:10px; position:relative; flex-shrink:0;
  background: linear-gradient(145deg, #1e3a5f 0%, #0f1f3d 50%, #0a1628 100%);
  border:2.5px solid #2a4a7a;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
  overflow:hidden;
}
.card-back::before {
  content:'TAKI'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',cursive; font-size:0.55rem; color:rgba(100,160,255,0.18);
  letter-spacing:2px; transform:rotate(-30deg);
}
.card-back::after {
  content:''; position:absolute; inset:3px; border-radius:7px;
  border:1.5px solid rgba(100,160,255,0.12);
  background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(100,160,255,0.03) 3px, rgba(100,160,255,0.03) 6px);
}
.opp-card-back { width:38px; height:54px; }

/* ── Center zone ── */
.center-zone { flex:1; display:flex; align-items:center; justify-content:center; gap:24px; padding:8px; position:relative; }

.pile-area { position:relative; width:calc(var(--pile-w) + 24px); height:calc(var(--pile-h) + 24px); }
.pile-card-wrap { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
.pile-card-wrap:nth-child(2) { transform:translate(-50%,-50%) rotate(-5deg); opacity:0.25; filter:blur(0.5px); }
.pile-card-wrap:nth-child(3) { transform:translate(-50%,-50%) rotate(3deg); opacity:0.5; }
.pile-card-wrap:nth-child(4) { transform:translate(-50%,-50%) rotate(-1deg); }

/* Pile glow */
.pile-glow {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:140px; height:170px; border-radius:24px; z-index:-1;
  filter:blur(35px); opacity:0.45; transition:background 0.5s;
}
.pile-glow-red { background:var(--red-glow); }
.pile-glow-blue { background:var(--blue-glow); }
.pile-glow-green { background:var(--green-glow); }
.pile-glow-yellow { background:var(--yellow-glow); }
.pile-glow-wild { background:rgba(168,85,247,0.35); }

/* Card fly-in animation */
@keyframes cardFlyIn {
  0% { transform:translate(-50%,80px) scale(0.4) rotate(20deg); opacity:0; }
  60% { transform:translate(-50%,-52%) scale(1.06) rotate(-2deg); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1) rotate(-1deg); opacity:1; }
}
.pile-card-animate { animation:cardFlyIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }

/* Active color indicator — glowing circle */
.active-color-dot {
  position:absolute; top:-10px; right:-10px; width:28px; height:28px; border-radius:50%;
  border:3px solid #fff; z-index:5;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.2), 0 0 14px var(--dot-glow, rgba(255,255,255,0.3));
  transition: background 0.3s, box-shadow 0.3s;
}

/* Plus2 stack indicator */
.plus2-indicator {
  position:absolute; top:-18px; left:50%; transform:translateX(-50%);
  background:rgba(220,38,38,0.9); color:#fff; font-size:0.7rem; font-weight:900;
  padding:2px 10px; border-radius:10px; white-space:nowrap; font-family:'Fredoka One',cursive;
  box-shadow:0 2px 10px rgba(220,38,38,0.4);
}

/* Draw pile */
.draw-pile { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; transition:transform 0.2s; }
.draw-pile:hover { transform:scale(1.05); }
.draw-pile:active { transform:scale(0.94); }
.draw-deck {
  width:var(--pile-w); height:var(--pile-h); border-radius:var(--pile-r); position:relative;
  background: linear-gradient(145deg, #1e3a5f 0%, #0f1f3d 50%, #0a1628 100%);
  border:3px solid #2a4a7a;
  box-shadow:0 6px 20px rgba(0,0,0,0.5), 4px 0 0 -1px #1a2f50, 4px 3px 0 -1px #0f1f3d;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.draw-deck::before {
  content:'TAKI'; position:absolute;
  font-family:'Fredoka One',cursive; font-size:0.9rem; color:rgba(100,160,255,0.2);
  letter-spacing:3px; transform:rotate(-30deg);
}
.draw-deck::after {
  content:''; position:absolute; inset:5px; border-radius:11px;
  border:1.5px solid rgba(100,160,255,0.1);
  background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(100,160,255,0.03) 4px, rgba(100,160,255,0.03) 8px);
}
.draw-count { font-size:0.55rem; font-weight:800; color:rgba(255,255,255,0.35); letter-spacing:0.5px; }

/* Status message (center bottom) */
.status-bar {
  position:absolute; bottom:6px; left:50%; transform:translateX(-50%); font-size:0.75rem; font-weight:800;
  padding:7px 20px; border-radius:18px; white-space:nowrap; z-index:50;
  background:rgba(0,0,0,0.55); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06); transition:all 0.3s;
}

/* ── Player zone ── */
.player-zone { flex:0 0 auto; padding:2px 6px 14px; padding-bottom:max(14px, env(safe-area-inset-bottom)); }
.hand-container {
  display:flex; justify-content:center; align-items:flex-end; min-height:125px; position:relative; padding:0 8px;
  overflow-x:auto; overflow-y:visible; -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.hand-container::-webkit-scrollbar { display:none; }

/* ===== REAL TAKI CARD DESIGN ===== */
/* Cards are WHITE with a colored border, number in the card's color */

.card {
  width:var(--card-w); height:var(--card-h); border-radius:var(--card-r); position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Fredoka One',cursive; cursor:pointer; flex-shrink:0;
  background:#fff;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s, margin 0.2s, filter 0.25s, opacity 0.25s;
  box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
.card.pile-size {
  width:var(--pile-w); height:var(--pile-h); border-radius:var(--pile-r);
}

/* Colored borders */
.card-red { border:8px solid var(--red); }
.card-blue { border:8px solid var(--blue); }
.card-green { border:8px solid var(--green); }
.card-yellow { border:8px solid var(--yellow); }
.card-wild { border:6px solid transparent; background-clip:padding-box;
  background-image:linear-gradient(#fff,#fff); background-origin:padding-box;
  box-shadow:0 3px 10px rgba(0,0,0,0.3);
  position:relative;
}
.card-wild::before {
  content:''; position:absolute; inset:-6px; border-radius:var(--card-r);
  background:linear-gradient(135deg, var(--red), var(--yellow) 33%, var(--green) 66%, var(--blue));
  z-index:-1;
}

/* Hand card interactivity */
.card.hand-card:hover { transform:translateY(-22px) scale(1.1) !important; box-shadow:0 14px 30px rgba(0,0,0,0.4); z-index:10; }
.card.hand-card:active { transform:translateY(-14px) scale(0.97) !important; }
.card.hand-card.playable-glow {
  box-shadow:0 3px 10px rgba(0,0,0,0.3), 0 0 16px var(--card-glow, rgba(255,255,255,0.2));
}
.card.hand-card.playable-glow:hover {
  box-shadow:0 14px 30px rgba(0,0,0,0.4), 0 0 24px var(--card-glow, rgba(255,255,255,0.3));
}
.card.hand-card.unplayable {
  opacity:0.4; cursor:default; filter:saturate(0.3) brightness(0.85);
  transform:translateY(8px) !important;
}
.card.hand-card.unplayable:hover { transform:translateY(8px) !important; box-shadow:0 3px 10px rgba(0,0,0,0.3); z-index:1; }

.card-red.hand-card { --card-glow:var(--red-glow); }
.card-blue.hand-card { --card-glow:var(--blue-glow); }
.card-green.hand-card { --card-glow:var(--green-glow); }
.card-yellow.hand-card { --card-glow:var(--yellow-glow); }
.card-wild.hand-card { --card-glow:rgba(168,85,247,0.4); }

/* Card inner content */
.card-center-num {
  font-size:2.2rem; line-height:1; font-weight:400; font-family:'Fredoka One',cursive;
}
.card.pile-size .card-center-num { font-size:2.8rem; }

.card-corner {
  position:absolute; font-size:0.55rem; font-weight:900; font-family:'Fredoka One',cursive;
}
.card.pile-size .card-corner { font-size:0.7rem; }
.card-corner-tl { top:2px; left:4px; }
.card-corner-br { bottom:2px; right:4px; transform:rotate(180deg); }

/* Color theming for text on white cards */
.card-red .card-center-num, .card-red .card-corner { color:var(--red); }
.card-blue .card-center-num, .card-blue .card-corner { color:var(--blue); }
.card-green .card-center-num, .card-green .card-corner { color:var(--green); }
.card-yellow .card-center-num, .card-yellow .card-corner { color:var(--yellow); }

/* ── TAKI card — diagonal text ── */
.card-taki-text {
  font-family:'Fredoka One',cursive; font-size:1.2rem; letter-spacing:3px;
  transform:rotate(-30deg); text-shadow:1px 1px 0 rgba(0,0,0,0.08);
  line-height:1;
}
.card.pile-size .card-taki-text { font-size:1.6rem; letter-spacing:4px; }
.card-red .card-taki-text { color:var(--red); }
.card-blue .card-taki-text { color:var(--blue); }
.card-green .card-taki-text { color:var(--green); }
.card-yellow .card-taki-text { color:var(--yellow); }

/* ── SUPER TAKI — rainbow border, diagonal text ── */
.card-super-taki .card-taki-text {
  background:linear-gradient(135deg, var(--red), var(--yellow), var(--green), var(--blue));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  font-size:1rem;
}
.card.pile-size.card-super-taki .card-taki-text { font-size:1.3rem; }

/* ── STOP card — octagon ── */
.card-stop-shape {
  width:32px; height:32px; position:relative; display:flex; align-items:center; justify-content:center;
}
.card.pile-size .card-stop-shape { width:42px; height:42px; }
.card-stop-shape svg { width:100%; height:100%; }
.card-red .card-stop-shape svg { fill:var(--red); }
.card-blue .card-stop-shape svg { fill:var(--blue); }
.card-green .card-stop-shape svg { fill:var(--green); }
.card-yellow .card-stop-shape svg { fill:var(--yellow); }
.card-stop-label {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:0.4rem; font-weight:900; color:#fff; font-family:'Fredoka One',cursive; letter-spacing:0.5px;
}
.card.pile-size .card-stop-label { font-size:0.5rem; }

/* ── Change Direction — circular arrows ── */
.card-dir-icon {
  font-size:1.7rem; line-height:1;
}
.card.pile-size .card-dir-icon { font-size:2.2rem; }
.card-red .card-dir-icon { color:var(--red); }
.card-blue .card-dir-icon { color:var(--blue); }
.card-green .card-dir-icon { color:var(--green); }
.card-yellow .card-dir-icon { color:var(--yellow); }

/* ── Plus 2 ── */
.card-plus2-text {
  font-size:1.8rem; font-weight:400; font-family:'Fredoka One',cursive; line-height:1;
}
.card.pile-size .card-plus2-text { font-size:2.4rem; }
.card-red .card-plus2-text { color:var(--red); }
.card-blue .card-plus2-text { color:var(--blue); }
.card-green .card-plus2-text { color:var(--green); }
.card-yellow .card-plus2-text { color:var(--yellow); }

/* ── Change Color — 4-color diamond ── */
.card-color-diamond {
  width:32px; height:32px; position:relative; transform:rotate(45deg);
  display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:2px;
  border-radius:4px; overflow:hidden;
}
.card.pile-size .card-color-diamond { width:42px; height:42px; }
.card-color-diamond div { border-radius:1px; }
.ccd-red { background:var(--red); }
.ccd-blue { background:var(--blue); }
.ccd-green { background:var(--green); }
.ccd-yellow { background:var(--yellow); }

/* ── TAKI open glow — colored border around play area ── */
.taki-open-glow {
  animation:takiGlow 0.7s ease-in-out infinite alternate;
}
@keyframes takiGlow {
  0% { box-shadow:inset 0 0 20px rgba(202,138,4,0.1), 0 0 20px rgba(202,138,4,0.1); }
  100% { box-shadow:inset 0 0 40px rgba(202,138,4,0.2), 0 0 40px rgba(202,138,4,0.2); }
}

/* ── Close TAKI button ── */
.close-taki-btn {
  position:fixed; bottom:162px; left:50%; transform:translateX(-50%); z-index:100;
  background:linear-gradient(135deg,#CA8A04,#DC2626); color:#fff; border:none; border-radius:22px;
  padding:12px 28px; font-size:0.95rem; font-weight:800; font-family:'Fredoka One',cursive;
  cursor:pointer; box-shadow:0 5px 20px rgba(220,38,38,0.3); animation:closeTakiBounce 1s ease-in-out infinite alternate;
  letter-spacing:0.5px;
}
@keyframes closeTakiBounce { 0% { transform:translateX(-50%) scale(1); } 100% { transform:translateX(-50%) scale(1.05); } }

/* ── Color picker ── */
.color-picker-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:22px;
  opacity:0; pointer-events:none; transition:opacity 0.35s;
}
.color-picker-overlay.active { opacity:1; pointer-events:auto; }
.color-picker h2 { font-size:1.3rem; text-shadow:0 2px 10px rgba(0,0,0,0.5); }
.color-diamond { position:relative; width:190px; height:190px; }
.color-circle {
  position:absolute; width:72px; height:72px; border-radius:50%;
  border:4px solid rgba(255,255,255,0.3); cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; font-weight:900; font-family:'Fredoka One',cursive; color:#fff;
}
.color-circle:hover { transform:scale(1.2); border-color:rgba(255,255,255,0.9); }
.color-circle:active { transform:scale(0.92); }
.cc-top { top:0; left:50%; transform:translateX(-50%); }
.cc-right { top:50%; right:0; transform:translateY(-50%); }
.cc-bottom { bottom:0; left:50%; transform:translateX(-50%); }
.cc-left { top:50%; left:0; transform:translateY(-50%); }
.cc-top:hover { transform:translateX(-50%) scale(1.2); }
.cc-right:hover { transform:translateY(-50%) scale(1.2); }
.cc-bottom:hover { transform:translateX(-50%) scale(1.2); }
.cc-left:hover { transform:translateY(-50%) scale(1.2); }

/* ── Winner overlay ── */
.winner-overlay {
  position:fixed; inset:0; z-index:400;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  opacity:0; pointer-events:none; transition:opacity 0.5s;
}
.winner-overlay.active { opacity:1; pointer-events:auto; }
.winner-card {
  padding:36px 44px; border-radius:24px; text-align:center;
  background:rgba(255,255,255,0.06); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1); box-shadow:0 20px 60px rgba(0,0,0,0.5);
  display:flex; flex-direction:column; align-items:center; gap:10px; max-width:320px;
}
.winner-emoji { font-size:4rem; animation:winBounce 0.8s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes winBounce { 0% { transform:scale(0) rotate(-180deg); } 60% { transform:scale(1.25) rotate(8deg); } 100% { transform:scale(1) rotate(0); } }
.winner-title { font-family:'Fredoka One',cursive; font-size:2rem;
  background:linear-gradient(135deg,#fde047,#f97316,#ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.winner-title-lose { background:linear-gradient(135deg,#94a3b8,#64748b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.winner-sub { font-size:0.9rem; color:rgba(255,255,255,0.5); font-weight:700; }
.winner-score-big { font-family:'Fredoka One',cursive; font-size:2.8rem; animation:scoreCount 0.6s ease-out;
  background:linear-gradient(135deg,#86efac,#4ade80); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
@keyframes scoreCount { 0% { transform:scale(0.3); opacity:0; } 100% { transform:scale(1); opacity:1; } }
.winner-stats { font-size:0.7rem; color:rgba(255,255,255,0.3); font-weight:700; }
.winner-btn {
  background:linear-gradient(135deg,#16A34A,#15803D); color:#fff; border:none; border-radius:22px;
  padding:13px 36px; font-size:1.05rem; font-weight:800; font-family:'Fredoka One',cursive;

<body>

<!-- RULES MODAL -->

<!-- Winner overlay -->

  </div>
</div>

<script>
// ─── INTRO FAN OF CARDS ───
(function initIntroFan() {
  const fan = document.getElementById('introFan');
  const cards = [
    { border:'var(--red)', text:'7', color:'var(--red)' },
    { border:'var(--blue)', text:'TAKI', color:'var(--blue)', isTaki:true },
    { border:'var(--green)', text:'3', color:'var(--green)' },
    { border:'var(--yellow)', text:'+2', color:'var(--yellow)' },
    { border:'rainbow', text:'', isWild:true },
    { border:'var(--red)', text:'9', color:'var(--red)' },
  ];
  const angles = [-25, -15, -5, 5, 15, 25];
  cards.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'intro-fan-card';
    if (c.isWild) {
      el.style.border = '5px solid transparent';
      el.style.backgroundClip = 'padding-box';
      el.style.backgroundImage = 'linear-gradient(#fff,#fff)';
      el.style.backgroundOrigin = 'padding-box';
      el.style.boxShadow = '0 4px 16px rgba(0,0,0,0.35)';
      // Rainbow border via box-shadow trick
      el.style.outline = 'none';
      el.innerHTML = '<div style="width:22px;height:22px;transform:rotate(45deg);display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;border-radius:2px;overflow:hidden"><div style="background:var(--red)"></div><div style="background:var(--blue)"></div><div style="background:var(--yellow)"></div><div style="background:var(--green)"></div></div>';
    } else {
      el.style.border = `6px solid ${c.border}`;
      el.style.color = c.color;
      if (c.isTaki) {
        el.innerHTML = `<span style="font-size:0.8rem;letter-spacing:2px;transform:rotate(-30deg);display:block">${c.text}</span>`;
      } else {
        el.textContent = c.text;
      }
    }
    el.style.setProperty('--fan-rot', `rotate(${angles[i]}deg)`);
    el.style.transform = `translateX(-50%) rotate(${angles[i]}deg)`;
    el.style.animationDelay = `${i * 0.15}s`;
    el.style.zIndex = i < 3 ? i : 6 - i;
    fan.appendChild(el);
  });
})();

// ─── CONFETTI ───
function spawnConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#DC2626','#2563EB','#16A34A','#CA8A04','#8B5CF6','#EC4899','#F97316','#06B6D4'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    container.appendChild(piece);
  }
}

// ─── LANGUAGE ───
let lang = localStorage.getItem('keren-lang') || 'he';
const T = {
  yourTurn: { he:'תורך! שחק קלף או משוך', en:'Your turn! Play or draw' },
  oppTurn: { he:'תור המחשב...', en:"Computer's turn..." },
  youWin: { he:'ניצחת! 🎉', en:'You Win! 🎉' },
  oppWin: { he:'המחשב ניצח 😅', en:'Computer Wins 😅' },
  takiOpen: { he:'טאקי פתוח! שחק עוד או סגור', en:'TAKI open! Play more or close' },
  mustDraw: { he:'אין קלף מתאים - משוך!', en:'No match - draw!' },
  skipped: { he:'דילגת! תור המחשב', en:'Skipped! CPU turn' },
  oppSkipped: { he:'המחשב דולג!', en:'CPU skipped!' },
  plus2: { he:'המחשב משך CARDS קלפים!', en:'CPU draws CARDS cards!' },
  youDraw: { he:'משכת קלף', en:'Drew a card' },
  plus2you: { he:'משכת CARDS קלפים!', en:'You drew CARDS cards!' },
  wins: { he:'נצחונות', en:'Wins' },
  score: { he:'ניקוד', en:'Score' },
  closeTaki: { he:'סגור טאקי ✋', en:'Close TAKI ✋' },
  chooseColor: { he:'בחר צבע', en:'Choose Color' },
  cpu: { he:'מחשב', en:'CPU' },
  newGame: { he:'חדש', en:'New' },
  home: { he:'🏠', en:'🏠' },
  play: { he:'🎮 שחק!', en:'🎮 Play!' },
  back: { he:'🏠 חזרה', en:'🏠 Home' },
  newGameBtn: { he:'🔄 משחק חדש', en:'🔄 New Game' },
  mainMenu: { he:'🏠 תפריט ראשי', en:'🏠 Main Menu' },
  introSub: { he:'משחק הקלפים הישראלי האהוב! שחקו נגד המחשב', en:'The beloved Israeli card game! Play vs Computer' },
  pointsLeft: { he:'נקודות נשארו ליריב', en:'points left for opponent' },
  youLostPoints: { he:'נקודות נשארו לך', en:'points left for you' },
  stackPlus2: { he:'+CARDS! שחק +2 או משוך', en:'+CARDS! Play +2 or draw' },
  you: { he:'אתה', en:'You' },
  computer: { he:'מחשב', en:'CPU' },
};
function t(key, replacements) {
  let s = T[key] ? T[key][lang] || T[key].he : key;
  if (replacements) Object.entries(replacements).forEach(([k,v]) => s = s.replace(k, v));
  return s;
}
function applyLang() {
  const isHe = lang === 'he';
  document.documentElement.lang = isHe ? 'he' : 'en';
  document.documentElement.dir = isHe ? 'rtl' : 'ltr';
  const lb = document.getElementById('langBtn');
  if (lb) lb.textContent = isHe ? 'EN' : 'עב';
  document.querySelectorAll('[data-he]').forEach(el => {
    el.textContent = isHe ? el.dataset.he : el.dataset.en;
  });
}
function toggleLang() {
  lang = lang === 'he' ? 'en' : 'he';
  localStorage.setItem('keren-lang', lang);
  applyLang();
  if (gameActive) renderAll();
  updateIntroStats();
  updateRulesLang();
}

// ─── RULES MODAL ───
const TAKI_RULES = {
  he: [
    '🎴 שחקו קלפים שמתאימים בצבע או במספר לקלף שבערימה',
    '🃏 אין לכם קלף מתאים? משכו מהחפיסה',
    '⚡ קלפים מיוחדים: טאקי (שחקו את כל הקלפים מאותו צבע), סטופ (דלגו על התור של היריב), +2 (היריב מושך 2 קלפים), החלף צבע (בחרו צבע חדש)',
    '🏆 הראשון שנפטר מכל הקלפים — מנצח!'
  ],
  en: [
    '🎴 Play cards matching the pile by color or number',
    '🃏 No matching card? Draw from the deck',
    '⚡ Special cards: TAKI (play all same-color cards), STOP (skip opponent), +2 (opponent draws 2), Change Color (pick new color)',
    '🏆 First to empty their hand wins!'
  ]
};
function openRulesModal() {
  updateRulesLang();
  document.getElementById('rulesOverlay').style.display = 'flex';
}
function closeRulesModal() {
  document.getElementById('rulesOverlay').style.display = 'none';
}
function updateRulesLang() {
  const isHe = lang === 'he';
  document.getElementById('rulesTitle').textContent = isHe ? 'הוראות משחק' : 'Game Rules';
  document.getElementById('rulesGotIt').textContent = isHe ? 'הבנתי!' : 'Got it!';
  const list = document.getElementById('rulesList');
  const rules = isHe ? TAKI_RULES.he : TAKI_RULES.en;
  list.innerHTML = rules.map(r => `<li>${r}</li>`).join('');
  list.closest('.rules-card').style.direction = isHe ? 'rtl' : 'ltr';
  list.closest('.rules-card').style.textAlign = isHe ? 'right' : 'left';
}

// ─── GAME STATE ───
const COLORS = ['red','blue','green','yellow'];
const NUMBERS = [1,2,3,4,5,6,7,8,9];
const SPECIALS = ['taki','stop','change_dir','plus2'];
let deck=[], discard=[], playerCards=[], oppCards=[], currentColor='', currentValue='';
let isPlayerTurn=true, gameActive=false, takiOpen=false, takiColor='';
let plus2Stack=0, colorPickerCallback=null;
let stats = JSON.parse(localStorage.getItem('taki-stats') || '{"wins":0,"losses":0,"totalScore":0}');

// ─── DECK ───
function createDeck() {
  const d = [];
  for (const color of COLORS) {
    for (const num of NUMBERS) {
      d.push({ color, value:String(num), type:'number' });
      d.push({ color, value:String(num), type:'number' });
    }
    for (const sp of SPECIALS) {
      d.push({ color, value:sp, type:'special' });
      d.push({ color, value:sp, type:'special' });
    }
  }
  for (let i=0; i<4; i++) d.push({ color:'wild', value:'change_color', type:'wild' });
  for (let i=0; i<2; i++) d.push({ color:'wild', value:'super_taki', type:'wild' });
  return d;
}
function shuffle(arr) { for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function cardLabel(card) {
  if (card.type === 'number') return card.value;
  const labels = { taki:'TAKI', stop:'STOP', change_dir:'DIR', plus2:'+2', change_color:'COLOR', super_taki:'S.TAKI' };
  return labels[card.value] || card.value;
}
function cardPoints(card) {
  if (card.type === 'number') return parseInt(card.value);
  const pts = { taki:20, stop:15, change_dir:15, plus2:20, change_color:30, super_taki:50 };
  return pts[card.value] || 10;
}

// ─── GAME INIT ───
function startGame() {
  document.getElementById('introScreen').classList.add('hidden');
  document.getElementById('topBar').style.display = '';
  document.getElementById('statusPanel').style.display = '';
  document.getElementById('gameArea').style.display = '';
  document.getElementById('winnerOverlay').classList.remove('active');
  document.getElementById('closeTakiBtn').style.display = 'none';
  document.getElementById('colorPicker').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML = '';

  deck = shuffle(createDeck());
  discard = [];
  playerCards = [];
  oppCards = [];
  takiOpen = false; takiColor = '';
  plus2Stack = 0;
  isPlayerTurn = true;
  gameActive = true;

  for (let i=0; i<8; i++) { playerCards.push(deck.pop()); oppCards.push(deck.pop()); }

  let starter;
  do { starter = deck.pop(); if (starter.type !== 'number') deck.unshift(starter); } while (starter.type !== 'number');
  discard.push(starter);
  currentColor = starter.color;
  currentValue = starter.value;

  renderAll();
  setStatus(t('yourTurn'));
  applyLang();
}

function showIntro() {
  gameActive = false;
  document.getElementById('introScreen').classList.remove('hidden');
  document.getElementById('topBar').style.display = 'none';
  document.getElementById('statusPanel').style.display = 'none';
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('winnerOverlay').classList.remove('active');
  document.getElementById('closeTakiBtn').style.display = 'none';
  updateIntroStats();
  applyLang();
}

function updateIntroStats() {
  const el = document.getElementById('introStats');
  if (el) el.textContent = `${t('wins')}: ${stats.wins} | ${t('score')}: ${stats.totalScore}`;
}

// ─── CAN PLAY ───
function canPlay(card) {
  if (card.color === 'wild') return true;
  if (card.color === currentColor) return true;
  if (card.type === 'number' && card.value === currentValue) return true;
  if (card.type === 'special' && card.value === currentValue) return true;
  return false;
}
function canPlayInTaki(card) {
  if (card.color === takiColor) return true;
  if (card.color === 'wild') return true;
  return false;
}
function canPlayPlus2(card) {
  return card.value === 'plus2';
}

// ─── SVG helpers ───
function stopOctagonSVG() {
  return '<svg viewBox="0 0 100 100"><polygon points="30,5 70,5 95,30 95,70 70,95 30,95 5,70 5,30"/></svg>';
}

// ─── RENDER ───
function renderAll() {
  renderOpp();
  renderPile();
  renderHand();
  renderDeck();
  updateStatusPanel();
}

function renderOpp() {
  const cont = document.getElementById('oppCards');
  const count = document.getElementById('oppCount');
  count.textContent = oppCards.length;
  cont.innerHTML = '';
  const max = Math.min(oppCards.length, 15);
  const overlap = Math.min(22, (cont.offsetWidth - 38) / Math.max(max - 1, 1));
  for (let i=0; i<max; i++) {
    const el = document.createElement('div');
    el.className = 'card-back opp-card-back';
    el.style.marginLeft = i === 0 ? '0' : `-${overlap}px`;
    const mid = (max - 1) / 2;
    const angle = (i - mid) * 1.5;
    el.style.transform = `rotate(${angle}deg)`;
    cont.appendChild(el);
  }
}

function renderPile() {
  const area = document.getElementById('pileArea');
  area.innerHTML = '';

  // Glow
  const glow = document.createElement('div');
  glow.className = 'pile-glow pile-glow-' + (currentColor || 'wild');
  area.appendChild(glow);

  const show = discard.slice(-3);
  show.forEach((card, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'pile-card-wrap';
    const el = createCardEl(card, false, true);
    el.style.cursor = 'default';
    wrap.appendChild(el);
    if (i === show.length - 1) wrap.classList.add('pile-card-animate');
    area.appendChild(wrap);
  });

  // Active color dot
  if (currentColor && currentColor !== 'wild') {
    const dot = document.createElement('div');
    dot.className = 'active-color-dot';
    dot.style.background = `var(--${currentColor})`;
    dot.style.setProperty('--dot-glow', `var(--${currentColor}-glow)`);
    area.appendChild(dot);
  }

  // Plus2 stack
  if (plus2Stack > 0) {
    const ind = document.createElement('div');
    ind.className = 'plus2-indicator';
    ind.textContent = `+${plus2Stack * 2}`;
    area.appendChild(ind);
  }

  // TAKI glow
  if (takiOpen) area.classList.add('taki-open-glow');
  else area.classList.remove('taki-open-glow');
}

function renderHand() {
  const cont = document.getElementById('playerHand');
  cont.innerHTML = '';
  const sorted = [...playerCards].sort((a,b) => {
    const ci = c => COLORS.indexOf(c.color) === -1 ? 99 : COLORS.indexOf(c.color);
    if (ci(a) !== ci(b)) return ci(a) - ci(b);
    if (a.type !== b.type) return a.type === 'number' ? -1 : 1;
    return (parseInt(a.value)||0) - (parseInt(b.value)||0);
  });
  const cardCount = sorted.length;
  const maxWidth = window.innerWidth - 20;
  const cardW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
  const overlap = cardCount > 1 ? Math.min(0, (maxWidth - cardW * cardCount) / (cardCount - 1)) : 0;
  const maxAngle = Math.min(cardCount * 1.5, 20);

  sorted.forEach((card, i) => {
    const el = createCardEl(card, true, false);
    el.classList.add('hand-card');
    const playable = isPlayerTurn && gameActive && !takiOpen ? (plus2Stack > 0 ? canPlayPlus2(card) : canPlay(card))
      : (takiOpen ? canPlayInTaki(card) : false);

    if (!playable && isPlayerTurn) {
      el.classList.add('unplayable');
    } else if (playable) {
      el.classList.add('playable-glow');
    }

    if (overlap < 0) el.style.marginLeft = i === 0 ? '0' : `${overlap}px`;

    if (cardCount > 1) {
      const mid = (cardCount - 1) / 2;
      const angle = (i - mid) * (maxAngle / cardCount);
      const lift = -Math.abs(i - mid) * 2;
      el.style.transform = `rotate(${angle}deg) translateY(${lift}px)`;
      el.style.transformOrigin = 'center 140%';
    }

    el.onclick = () => playerPlayCard(card, el);
    cont.appendChild(el);
  });
}

function renderDeck() {
  const el = document.getElementById('drawCount');
  const n = deck.length;
  el.textContent = lang === 'he' ? `${n} קלפים` : `${n} cards`;
}

function updateStatusPanel() {
  const turn = document.getElementById('statusTurn');
  const badges = document.getElementById('statusBadges');
  badges.innerHTML = '';

  if (isPlayerTurn) {
    turn.textContent = '🎯 ' + t('you');
    turn.style.color = '#4ade80';
  } else {
    turn.textContent = '🤖 ' + t('computer');
    turn.style.color = '#c084fc';
  }

  if (takiOpen) {
    const b = document.createElement('div');
    b.className = 'status-badge taki-badge';
    b.textContent = 'TAKI';
    badges.appendChild(b);
  }
  if (plus2Stack > 0) {
    const b = document.createElement('div');
    b.className = 'status-badge plus-badge';
    b.textContent = `+${plus2Stack * 2}`;
    badges.appendChild(b);
  }
  const cb = document.createElement('div');
  cb.className = 'status-badge';
  cb.textContent = `🃏 ${playerCards.length} vs ${oppCards.length}`;
  badges.appendChild(cb);

  if (stats.wins > 0) {
    const wb = document.createElement('div');
    wb.className = 'status-badge';
    wb.textContent = `🏆 ${stats.wins}`;
    badges.appendChild(wb);
  }
}

// ─── CREATE CARD ELEMENT (authentic Taki design) ───
function createCardEl(card, interactive, isPile) {
  const el = document.createElement('div');
  const isWild = card.color === 'wild';
  const isSuperTaki = card.value === 'super_taki';

  el.className = `card card-${isWild ? 'wild' : card.color}`;
  if (isPile) el.classList.add('pile-size');
  if (isSuperTaki) el.classList.add('card-super-taki');

  if (card.value === 'taki' || card.value === 'super_taki') {
    // TAKI / Super TAKI — diagonal text
    const label = isSuperTaki ? 'TAKI' : 'TAKI';
    el.innerHTML = `<div class="card-taki-text">${label}</div>`;
  } else if (card.value === 'stop') {
    // STOP — octagon shape
    el.innerHTML = `
      <div class="card-stop-shape">${stopOctagonSVG()}<span class="card-stop-label">STOP</span></div>
      <span class="card-corner card-corner-tl">⛔</span>
      <span class="card-corner card-corner-br">⛔</span>
    `;
  } else if (card.value === 'change_dir') {
    // Change direction — circular arrows
    el.innerHTML = `
      <div class="card-dir-icon">↻</div>
      <span class="card-corner card-corner-tl">↻</span>
      <span class="card-corner card-corner-br">↻</span>
    `;
  } else if (card.value === 'plus2') {
    // Plus 2
    el.innerHTML = `
      <div class="card-plus2-text">+2</div>
      <span class="card-corner card-corner-tl">+2</span>
      <span class="card-corner card-corner-br">+2</span>
    `;
  } else if (card.value === 'change_color') {
    // Change color — 4-color diamond
    el.innerHTML = `
      <div class="card-color-diamond">
        <div class="ccd-red"></div><div class="ccd-blue"></div>
        <div class="ccd-yellow"></div><div class="ccd-green"></div>
      </div>
    `;
  } else {
    // Number card
    el.innerHTML = `
      <div class="card-center-num">${card.value}</div>
      <span class="card-corner card-corner-tl">${card.value}</span>
      <span class="card-corner card-corner-br">${card.value}</span>
    `;
  }
  return el;
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

// ─── PLAYER ACTIONS ───
function playerPlayCard(card, el) {
  if (!gameActive || !isPlayerTurn) return;

  if (takiOpen) {
    if (!canPlayInTaki(card)) return;
    if (card.color === 'wild') {
      playCard(card, 'player');
      removeFromHand(card, 'player');
      if (checkWin('player')) return;
      renderAll();
      return;
    }
    playCard(card, 'player');
    removeFromHand(card, 'player');
    if (checkWin('player')) return;
    if (card.value === 'taki') { renderAll(); return; }
    renderAll();
    return;
  }

  if (plus2Stack > 0) {
    if (card.value !== 'plus2') return;
    plus2Stack++;
    playCard(card, 'player');
    removeFromHand(card, 'player');
    if (checkWin('player')) return;
    isPlayerTurn = false;
    renderAll();
    setTimeout(() => aiTurn(), 800);
    return;
  }

  if (!canPlay(card)) return;

  if (card.value === 'change_color') {
    removeFromHand(card, 'player');
    showColorPicker(color => {
      currentColor = color;
      currentValue = 'change_color';
      discard.push(card);
      if (checkWin('player')) return;
      isPlayerTurn = false;
      renderAll();
      setTimeout(() => aiTurn(), 800);
    });
    return;
  }
  if (card.value === 'super_taki') {
    removeFromHand(card, 'player');
    showColorPicker(color => {
      currentColor = color;
      currentValue = 'super_taki';
      discard.push(card);
      takiOpen = true;
      takiColor = color;
      document.getElementById('closeTakiBtn').style.display = '';
      setStatus(t('takiOpen'));
      if (checkWin('player')) return;
      renderAll();
    });
    return;
  }

  playCard(card, 'player');
  removeFromHand(card, 'player');
  if (checkWin('player')) return;

  if (card.value === 'taki') {
    takiOpen = true;
    takiColor = card.color;
    document.getElementById('closeTakiBtn').style.display = '';
    setStatus(t('takiOpen'));
    renderAll();
    return;
  }
  if (card.value === 'stop' || card.value === 'change_dir') {
    setStatus(t('oppSkipped'));
    renderAll();
    setTimeout(() => { setStatus(t('yourTurn')); renderAll(); }, 1000);
    return;
  }
  if (card.value === 'plus2') {
    plus2Stack = 1;
    isPlayerTurn = false;
    renderAll();
    setTimeout(() => aiTurn(), 800);
    return;
  }

  isPlayerTurn = false;
  renderAll();
  setStatus(t('oppTurn'));
  setTimeout(() => aiTurn(), 800);
}

function closeTaki() {
  if (!takiOpen) return;
  takiOpen = false;
  takiColor = '';
  document.getElementById('closeTakiBtn').style.display = 'none';
  isPlayerTurn = false;
  renderAll();
  setStatus(t('oppTurn'));
  setTimeout(() => aiTurn(), 800);
}

function playerDraw() {
  if (!gameActive || !isPlayerTurn || takiOpen) return;

  if (plus2Stack > 0) {
    const count = plus2Stack * 2;
    for (let i=0; i<count; i++) playerCards.push(drawCard());
    setStatus(t('plus2you', { CARDS: count }));
    plus2Stack = 0;
    isPlayerTurn = false;
    renderAll();
    setTimeout(() => aiTurn(), 1000);
    return;
  }

  const drawn = drawCard();
  playerCards.push(drawn);
  setStatus(t('youDraw'));
  isPlayerTurn = false;
  renderAll();
  setTimeout(() => aiTurn(), 800);
}

// ─── PLAY CARD (shared) ───
function playCard(card, who) {
  discard.push(card);
  if (card.color !== 'wild') {
    currentColor = card.color;
  }
  currentValue = card.value;
}

function removeFromHand(card, who) {
  const hand = who === 'player' ? playerCards : oppCards;
  const idx = hand.indexOf(card);
  if (idx !== -1) hand.splice(idx, 1);
}

function drawCard() {
  if (deck.length === 0) {
    const top = discard.pop();
    deck = shuffle(discard);
    discard = [top];
  }
  return deck.pop();
}

// ─── AI ───
function aiTurn() {
  if (!gameActive) return;
  isPlayerTurn = false;
  setStatus(t('oppTurn'));

  if (plus2Stack > 0) {
    const p2 = oppCards.filter(c => c.value === 'plus2');
    if (p2.length > 0) {
      const card = p2[0];
      plus2Stack++;
      playCard(card, 'opp');
      removeFromHand(card, 'opp');
      renderAll();
      if (checkWin('opp')) return;
      isPlayerTurn = true;
      setTimeout(() => {
        setStatus(t('stackPlus2', { CARDS: plus2Stack * 2 }));
        renderAll();
      }, 600);
      return;
    } else {
      const count = plus2Stack * 2;
      for (let i=0; i<count; i++) oppCards.push(drawCard());
      plus2Stack = 0;
      setStatus(t('plus2', { CARDS: count }));
      renderAll();
      isPlayerTurn = true;
      setTimeout(() => { setStatus(t('yourTurn')); renderAll(); }, 1200);
      return;
    }
  }

  const playable = oppCards.filter(c => canPlay(c));
  if (playable.length === 0) {
    oppCards.push(drawCard());
    renderAll();
    isPlayerTurn = true;
    setTimeout(() => { setStatus(t('yourTurn')); renderAll(); }, 800);
    return;
  }

  const card = aiChooseCard(playable);

  if (card.value === 'change_color' || card.value === 'super_taki') {
    removeFromHand(card, 'opp');
    const chosen = aiPickColor();
    currentColor = chosen;
    currentValue = card.value;
    discard.push(card);
    renderAll();
    if (checkWin('opp')) return;

    if (card.value === 'super_taki') {
      setTimeout(() => aiPlayTakiSequence(chosen), 600);
      return;
    }
    isPlayerTurn = true;
    setTimeout(() => { setStatus(t('yourTurn')); renderAll(); }, 800);
    return;
  }

  playCard(card, 'opp');
  removeFromHand(card, 'opp');
  renderAll();
  if (checkWin('opp')) return;

  if (card.value === 'taki') {
    setTimeout(() => aiPlayTakiSequence(card.color), 600);
    return;
  }
  if (card.value === 'stop' || card.value === 'change_dir') {
    setStatus(t('skipped'));
    renderAll();
    setTimeout(() => aiTurn(), 1000);
    return;
  }
  if (card.value === 'plus2') {
    plus2Stack = 1;
    isPlayerTurn = true;
    setTimeout(() => {
      setStatus(t('stackPlus2', { CARDS: plus2Stack * 2 }));
      renderAll();
    }, 600);
    return;
  }

  isPlayerTurn = true;
  setTimeout(() => { setStatus(t('yourTurn')); renderAll(); }, 800);
}

function aiPlayTakiSequence(color) {
  if (!gameActive) return;
  const matching = oppCards.filter(c => c.color === color);
  if (matching.length === 0) {
    isPlayerTurn = true;
    setTimeout(() => { setStatus(t('yourTurn')); renderAll(); }, 500);
    return;
  }
  const card = matching[0];
  playCard(card, 'opp');
  removeFromHand(card, 'opp');
  renderAll();
  if (checkWin('opp')) return;
  if (card.value === 'taki') {
    setTimeout(() => aiPlayTakiSequence(color), 500);
    return;
  }
  setTimeout(() => {
    const more = oppCards.filter(c => c.color === color);
    if (more.length > 0) {
      aiPlayTakiSequence(color);
    } else {
      isPlayerTurn = true;
      setStatus(t('yourTurn'));
      renderAll();
    }
  }, 500);
}

function aiChooseCard(playable) {
  const prio = ['plus2','stop','change_dir','taki'];
  for (const p of prio) {
    const found = playable.find(c => c.value === p && c.color !== 'wild');
    if (found) return found;
  }
  const numbers = playable.filter(c => c.type === 'number').sort((a,b) => parseInt(b.value) - parseInt(a.value));
  if (numbers.length > 0) return numbers[0];
  return playable[0];
}

function aiPickColor() {
  const counts = {};
  COLORS.forEach(c => counts[c] = 0);
  oppCards.forEach(c => { if (c.color !== 'wild') counts[c.color]++; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

// ─── COLOR PICKER ───
function showColorPicker(callback) {
  colorPickerCallback = callback;
  document.getElementById('colorPicker').classList.add('active');
}
function pickColor(color) {
  document.getElementById('colorPicker').classList.remove('active');
  if (colorPickerCallback) {
    colorPickerCallback(color);
    colorPickerCallback = null;
  }
}

// ─── WIN CHECK ───
function checkWin(who) {
  const hand = who === 'player' ? playerCards : oppCards;
  if (hand.length > 0) return false;
  gameActive = false;
  takiOpen = false;
  document.getElementById('closeTakiBtn').style.display = 'none';

  const overlay = document.getElementById('winnerOverlay');
  const emoji = document.getElementById('winnerEmoji');
  const title = document.getElementById('winnerTitle');
  const scoreBig = document.getElementById('winnerScoreBig');
  const sub = document.getElementById('winnerSub');
  const wstats = document.getElementById('winnerStats');

  if (who === 'player') {
    const score = oppCards.reduce((s,c) => s + cardPoints(c), 0);
    stats.wins++;
    stats.totalScore += score;
    localStorage.setItem('taki-stats', JSON.stringify(stats));
    emoji.textContent = '🏆';
    title.textContent = t('youWin');
    title.className = 'winner-title';
    scoreBig.textContent = score;
    sub.textContent = `${score} ${t('pointsLeft')}`;
    wstats.textContent = `${t('wins')}: ${stats.wins} | ${t('score')}: ${stats.totalScore}`;
    spawnConfetti();
  } else {
    const score = playerCards.reduce((s,c) => s + cardPoints(c), 0);
    stats.losses++;
    localStorage.setItem('taki-stats', JSON.stringify(stats));
    emoji.textContent = '😅';
    title.textContent = t('oppWin');
    title.className = 'winner-title winner-title-lose';
    scoreBig.textContent = score;
    sub.textContent = `${score} ${t('youLostPoints')}`;
    wstats.textContent = `${t('wins')}: ${stats.wins} | ${t('score')}: ${stats.totalScore}`;
  }
  setTimeout(() => overlay.classList.add('active'), 300);
  return true;
}

// ─── INIT ───
updateIntroStats();
applyLang();
</script>
